<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Facturatie Mapping Beheer</title>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<style>
  :root {
    --ts-blue: #0e2a47;
    --ts-accent: #1e6fbd;
    --ts-light: #e8f0f9;
    --ts-border: #d0dce8;
    --ts-muted: #6b7f96;
    --ts-success: #1a7f4b;
    --ts-success-bg: #eafaf2;
    --ts-warning: #b45309;
    --ts-warning-bg: #fffbeb;
    --ts-danger: #b91c1c;
    --ts-danger-bg: #fef2f2;
    --ts-white: #ffffff;
    --ts-bg: #f4f7fb;
    --ts-card: #ffffff;
    --radius: 8px;
    --shadow: 0 1px 4px rgba(14,42,71,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--ts-bg); color: var(--ts-blue); font-size: 14px; }

  /* Layout */
  .shell { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; background: var(--ts-blue); flex-shrink: 0; display: flex; flex-direction: column; }
  .sidebar-logo { padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .sidebar-logo .brand { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: 0.02em; }
  .sidebar-logo .sub { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .nav { padding: 12px 0; flex: 1; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 20px; color: rgba(255,255,255,0.65); cursor: pointer; font-size: 13px; transition: background 0.15s, color 0.15s; }
  .nav-item:hover { background: rgba(255,255,255,0.07); color: #fff; }
  .nav-item.active { background: rgba(30,111,189,0.4); color: #fff; border-left: 3px solid #4da3ff; padding-left: 17px; }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .sidebar-user { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 12px; color: rgba(255,255,255,0.5); }
  .sidebar-user .uname { color: rgba(255,255,255,0.85); font-weight: 500; }

  .main { flex: 1; overflow: auto; }
  .topbar { background: var(--ts-white); border-bottom: 1px solid var(--ts-border); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; }
  .topbar h1 { font-size: 16px; font-weight: 600; color: var(--ts-blue); }
  .topbar .actions { display: flex; gap: 8px; }
  .content { padding: 24px 28px; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: var(--ts-accent); color: #fff; }
  .btn-primary:hover { background: #1560a8; }
  .btn-secondary { background: var(--ts-white); color: var(--ts-blue); border: 1px solid var(--ts-border); }
  .btn-secondary:hover { background: var(--ts-light); }
  .btn-danger { background: var(--ts-danger-bg); color: var(--ts-danger); border: 1px solid #fecaca; }
  .btn-danger:hover { background: #fee2e2; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Cards */
  .card { background: var(--ts-card); border: 1px solid var(--ts-border); border-radius: var(--radius); box-shadow: var(--shadow); }
  .card-header { padding: 14px 18px; border-bottom: 1px solid var(--ts-border); display: flex; align-items: center; justify-content: space-between; }
  .card-header h2 { font-size: 14px; font-weight: 600; }
  .card-body { padding: 18px; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
  .stat-card { background: var(--ts-card); border: 1px solid var(--ts-border); border-radius: var(--radius); padding: 16px 18px; }
  .stat-val { font-size: 26px; font-weight: 700; color: var(--ts-accent); line-height: 1; }
  .stat-lbl { font-size: 11px; color: var(--ts-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* Product grid */
  .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .product-tile { background: var(--ts-card); border: 1.5px solid var(--ts-border); border-radius: var(--radius); padding: 12px 14px; cursor: pointer; transition: all 0.15s; }
  .product-tile:hover { border-color: var(--ts-accent); box-shadow: 0 2px 8px rgba(30,111,189,0.12); }
  .product-tile.active { border-color: var(--ts-accent); background: var(--ts-light); }
  .product-tile .pname { font-weight: 600; font-size: 13px; }
  .product-tile .pmeta { font-size: 11px; color: var(--ts-muted); margin-top: 3px; }
  .badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; margin-top: 6px; letter-spacing: 0.03em; }
  .badge-auto { background: var(--ts-success-bg); color: var(--ts-success); }
  .badge-csv  { background: var(--ts-light); color: var(--ts-accent); }
  .badge-mail { background: var(--ts-warning-bg); color: var(--ts-warning); }

  /* Table */
  .tbl { width: 100%; border-collapse: collapse; }
  .tbl th { text-align: left; font-size: 11px; font-weight: 600; color: var(--ts-muted); text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 12px; border-bottom: 1px solid var(--ts-border); background: var(--ts-bg); }
  .tbl td { padding: 8px 12px; border-bottom: 1px solid var(--ts-border); vertical-align: middle; }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl tr:hover td { background: var(--ts-bg); }
  .tbl input { width: 100%; border: 1px solid var(--ts-border); border-radius: 5px; padding: 5px 8px; font-size: 13px; font-family: inherit; color: var(--ts-blue); background: var(--ts-white); }
  .tbl input:focus { outline: none; border-color: var(--ts-accent); }

  /* Login screen */
  .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--ts-blue); }
  .login-box { background: #fff; border-radius: 12px; padding: 40px; text-align: center; width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
  .login-box .logo { font-size: 20px; font-weight: 700; color: var(--ts-blue); margin-bottom: 6px; }
  .login-box .sub { font-size: 13px; color: var(--ts-muted); margin-bottom: 28px; }
  .login-box .btn { width: 100%; justify-content: center; padding: 11px; font-size: 14px; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--ts-blue); color: #fff; padding: 12px 18px; border-radius: var(--radius); font-size: 13px; box-shadow: 0 4px 16px rgba(0,0,0,0.2); z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--ts-success); }
  .toast.error { background: var(--ts-danger); }

  /* Loader */
  .loader { display: flex; align-items: center; gap: 10px; color: var(--ts-muted); font-size: 13px; padding: 24px 0; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--ts-border); border-top-color: var(--ts-accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state { text-align: center; padding: 32px; color: var(--ts-muted); font-size: 13px; }
  .section-title { font-size: 13px; font-weight: 600; color: var(--ts-blue); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .divider { border: none; border-top: 1px solid var(--ts-border); margin: 20px 0; }
  .tag { display: inline-flex; align-items: center; gap: 4px; background: var(--ts-light); color: var(--ts-accent); border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 500; }
  select.tbl-select { width: 100%; border: 1px solid var(--ts-border); border-radius: 5px; padding: 5px 8px; font-size: 13px; font-family: inherit; color: var(--ts-blue); background: var(--ts-white); }
  select.tbl-select:focus { outline: none; border-color: var(--ts-accent); }
  .sync-step { display: none; }
  .sync-step.active { display: block; }
  .step-indicator { display: flex; gap: 0; margin-bottom: 24px; }
  .step-dot { flex: 1; text-align: center; padding: 10px; font-size: 12px; font-weight: 600; color: var(--ts-muted); border-bottom: 3px solid var(--ts-border); }
  .step-dot.active { color: var(--ts-accent); border-color: var(--ts-accent); }
  .step-dot.done { color: var(--ts-success); border-color: var(--ts-success); }
  .upload-zone { border: 2px dashed var(--ts-border); border-radius: var(--radius); padding: 40px; text-align: center; cursor: pointer; transition: all 0.2s; }
  .upload-zone:hover { border-color: var(--ts-accent); background: var(--ts-light); }
  .upload-zone input { display: none; }
  .upload-zone .icon { font-size: 32px; margin-bottom: 8px; }
  .upload-zone p { color: var(--ts-muted); font-size: 13px; }
  .mapping-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  .mapping-table th { background: var(--ts-bg); padding: 8px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ts-muted); text-align: left; border-bottom: 1px solid var(--ts-border); }
  .mapping-table td { padding: 8px 12px; border-bottom: 1px solid var(--ts-border); font-size: 13px; vertical-align: middle; }
  .mapping-table select { width: 100%; border: 1px solid var(--ts-border); border-radius: 5px; padding: 5px 8px; font-size: 13px; background: var(--ts-white); color: var(--ts-blue); }
  .diff-new { background: var(--ts-success-bg); }
  .diff-changed { background: #fffbeb; }
  .diff-closed { background: var(--ts-danger-bg); }
  .diff-unchanged { background: var(--ts-white); }
  .diff-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
  .diff-badge.new { background: var(--ts-success-bg); color: var(--ts-success); }
  .diff-badge.changed { background: #fffbeb; color: var(--ts-warning); }
  .diff-badge.closed { background: var(--ts-danger-bg); color: var(--ts-danger); }
  .diff-badge.ok { background: var(--ts-light); color: var(--ts-muted); }
  .diff-badge.ignored { background: #f1f5f9; color: #94a3b8; }
  .diff-ignored td { opacity: 0.4; }
  .afas-token-input { width: 100%; border: 1px solid var(--ts-border); border-radius: 5px; padding: 8px 12px; font-size: 13px; font-family: monospace; color: var(--ts-blue); background: var(--ts-white); margin-bottom: 8px; }
  .progress-bar { height: 6px; background: var(--ts-border); border-radius: 3px; margin: 12px 0; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--ts-accent); border-radius: 3px; transition: width 0.3s; }
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  .filter-bar input, .filter-bar select { font-size: 12px; padding: 6px 10px; border: 1px solid var(--ts-border); border-radius: var(--radius); background: var(--ts-white); color: var(--ts-blue); height: 32px; }
  .filter-bar input { min-width: 160px; }
  .filter-bar select { min-width: 140px; }
  .regels-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  .regels-tbl th { position: sticky; top: 0; background: var(--ts-bg); padding: 8px 10px; text-align: left; font-size: 11px; font-weight: 600; color: var(--ts-muted); text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--ts-border); cursor: pointer; user-select: none; white-space: nowrap; }
  .regels-tbl th:hover { color: var(--ts-accent); }
  .regels-tbl th .sort-icon { margin-left: 4px; opacity: 0.4; }
  .regels-tbl th.sorted .sort-icon { opacity: 1; color: var(--ts-accent); }
  .regels-tbl td { padding: 7px 10px; border-bottom: 1px solid var(--ts-border); vertical-align: middle; white-space: nowrap; }
  .regels-tbl tr:hover td { background: var(--ts-bg); }
  .regels-tbl tr.editing td { background: var(--ts-light); }
  .inline-input { border: 1px solid var(--ts-accent); border-radius: 4px; padding: 3px 6px; font-size: 13px; font-family: inherit; color: var(--ts-blue); background: white; width: 100%; min-width: 60px; }
  .inline-input:focus { outline: none; box-shadow: 0 0 0 2px rgba(30,111,189,0.2); }
  .edit-btn { background: none; border: none; cursor: pointer; color: var(--ts-muted); padding: 3px 6px; border-radius: 4px; font-size: 12px; }
  .edit-btn:hover { background: var(--ts-light); color: var(--ts-accent); }
  .save-row-btn { background: var(--ts-accent); color: white; border: none; border-radius: 4px; padding: 3px 10px; font-size: 12px; cursor: pointer; }
  .save-row-btn:hover { background: #1560a8; }
  .cancel-row-btn { background: none; border: 1px solid var(--ts-border); border-radius: 4px; padding: 3px 10px; font-size: 12px; cursor: pointer; color: var(--ts-muted); margin-left: 4px; }
  .tbl-wrapper { max-height: calc(100vh - 280px); overflow-y: auto; border: 1px solid var(--ts-border); border-radius: var(--radius); }
  .regels-count { font-size: 12px; color: var(--ts-muted); margin-left: auto; }
</style>
</head>
<body>

<!-- Login screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="logo">🔒 ThreadStone</div>
    <div class="sub">Facturatie Mapping Beheer<br>Log in met je Microsoft-account</div>
    <button class="btn btn-primary" id="loginBtn" onclick="signIn()" disabled>
      <svg viewBox="0 0 21 21" width="16" height="16" fill="currentColor"><path d="M0 0h10v10H0zm11 0h10v10H11zM0 11h10v10H0zm11 0h10v10H11z"/></svg>
      <span id="loginBtnText">Bezig met laden...</span>
    </button>
  </div>
</div>

<!-- App shell -->
<div class="shell" id="appShell" style="display:none">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="brand">ThreadStone</div>
      <div class="sub">Facturatie Beheer</div>
    </div>
    <nav class="nav">
      <div class="nav-item active" onclick="showTab('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </div>

      <div class="nav-item" onclick="showTab('abonnementen')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
        Abonnementen
      </div>
      <div class="nav-item" onclick="showTab('regels')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Abonnementsregels
      </div>
      <div class="nav-item" onclick="showTab('korting')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 7h.01M17 17h.01M3 12a9 9 0 1018 0 9 9 0 00-18 0zM7.5 7.5l9 9"/></svg>
        Korting Techone
      </div>
      <div class="nav-item" onclick="showTab('voorcalculaties')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Voorcalculaties
      </div>
      <div class="nav-item" onclick="showTab('sync')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        AFAS Sync
      </div>
    </nav>
    <div class="sidebar-user">
      <div class="uname" id="sidebarUser">—</div>
      <div style="margin-top:4px; cursor:pointer; font-size:11px;" onclick="signOut()">Uitloggen</div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <h1 id="pageTitle">Dashboard</h1>
      <div class="actions" id="topActions"></div>
    </div>
    <div class="content" id="mainContent">
      <div class="loader"><div class="spinner"></div> Laden...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const CLIENT_ID  = 'da072118-d9bc-4a32-a2b9-099fc610643e';
const TENANT_ID  = '63acceb2-e69a-4ffc-8ab0-737752764237';
const SITE_URL   = 'https://threadstonecs.sharepoint.com/sites/team_finance';
const GRAPH      = 'https://graph.microsoft.com/v1.0';
const SCOPES     = ['https://graph.microsoft.com/Sites.ReadWrite.All'];

let siteId = null;
let token  = null;
let producten = [];
let activeProduct = null;

// ── MSAL ────────────────────────────────────────────────────────────────────
const msalApp = new msal.PublicClientApplication({
  auth: {
    clientId: CLIENT_ID,
    authority: `https://login.microsoftonline.com/${TENANT_ID}`,
    redirectUri: 'https://threadstone-cyber-security.github.io/facturatie-beheer/',
  },
  cache: { cacheLocation: 'sessionStorage' }
});

async function signIn() {
  try {
    const res = await msalApp.loginPopup({ scopes: SCOPES });
    await initApp(res.account);
  } catch(e) { showToast('Inloggen mislukt: ' + e.message, 'error'); }
}

function signOut() {
  msalApp.logoutPopup();
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appShell').style.display = 'none';
}

async function getToken() {
  const accounts = msalApp.getAllAccounts();
  if (!accounts.length) throw new Error('Niet ingelogd');
  const res = await msalApp.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
  return res.accessToken;
}

async function graph(method, path, body) {
  token = await getToken();
  const opts = {
    method,
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(GRAPH + path, opts);
  if (!r.ok) throw new Error(`Graph ${method} ${path} → ${r.status}: ${await r.text()}`);
  if (r.status === 204) return null;
  return r.json();
}

// ── Init ────────────────────────────────────────────────────────────────────
async function initApp(account) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'flex';
  document.getElementById('sidebarUser').textContent = account.name || account.username;

  try {
    const site = await graph('GET', `/sites/threadstonecs.sharepoint.com:/sites/team_finance`);
    siteId = site.id;
    await loadProducenten();
    showTab('dashboard');
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `<div class="empty-state">Fout bij laden: ${e.message}</div>`;
  }
}

async function loadProducenten() {
  const data = await graph('GET', `/sites/${siteId}/lists/Producten/items?$expand=fields&$top=100`);
  producten = (data.value || []).map(i => ({
    id: i.id,
    naam: i.fields.Title,
    brontype: i.fields.Brontype || '',
    bronlocatie: i.fields.Bronlocatie || '',
    afas: i.fields.AFASDoorbelasting || '',
    actief: i.fields.Actief !== false,
  }));
}

// ── Tab routing ──────────────────────────────────────────────────────────────
function showTab(tab) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.nav-item')[['dashboard','abonnementen','regels','korting','voorcalculaties','sync'].indexOf(tab)]?.classList.add('active');
  const titles = { dashboard: 'Dashboard', abonnementen: 'Abonnementen', regels: 'Abonnementsregels', korting: 'Korting Techone', voorcalculaties: 'Voorcalculaties', sync: 'AFAS Sync' };
  document.getElementById('pageTitle').textContent = titles[tab];
  document.getElementById('topActions').innerHTML = '';
  if (tab === 'dashboard') renderDashboard();
  else if (tab === 'mapping') renderMapping();
  else if (tab === 'validatie') renderValidatie();
  else if (tab === 'producten') renderProducten();
  else if (tab === 'abonnementen') renderAbonnementen();
  else if (tab === 'regels') renderRegels();
  else if (tab === 'korting') renderKorting();
  else if (tab === 'voorcalculaties') renderVoorcalculaties();
  else if (tab === 'sync') renderSync();
}

// ── Dashboard ────────────────────────────────────────────────────────────────
async function renderDashboard() {
  const c = document.getElementById('mainContent');
  c.innerHTML = '<div class="loader"><div class="spinner"></div> Dashboard laden...</div>';

  // Use cached regels if available, otherwise show prompt
  const regels = alleRegels;
  const heeftData = regels.length > 0;

  if (!heeftData) {
    c.innerHTML = `
      <div class="card" style="text-align:center;padding:40px">
        <div style="font-size:32px;margin-bottom:12px">📊</div>
        <div style="font-weight:600;font-size:15px;margin-bottom:8px">Laad eerst de abonnementsregels</div>
        <div style="color:var(--ts-muted);font-size:13px;margin-bottom:20px">Ga naar Abonnementsregels, vul het AFAS token in en klik Laden. Dan verschijnt hier het dashboard.</div>
        <button class="btn btn-primary" onclick="showTab('regels')">→ Naar abonnementsregels</button>
      </div>`;
    return;
  }

  // Compute stats
  const totaalRegels = regels.length;
  const uniekeKlanten = new Set(actieveRegels.map(r => r.OrganisatieId)).size;

async function renderMapping() {
  const c = document.getElementById('mainContent');
  c.innerHTML = '<div class="loader"><div class="spinner"></div> Mapping regels laden...</div>';

  if (!activeProduct) activeProduct = producten.find(p => p.brontype === 'CSV / Excel')?.naam || producten[0]?.naam;

  try {
    const mapData = await graph('GET', `/sites/${siteId}/lists/MappingRegels/items?$expand=fields&$top=500`);
    const allMappings = mapData.value || [];

    const productTiles = producten.map(p => {
      const count = allMappings.filter(m => m.fields.Product === p.naam).length;
      return `<div class="product-tile ${p.naam === activeProduct ? 'active' : ''}" onclick="selectProduct('${p.naam}')">
        <div class="pname">${p.naam}</div>
        <div class="pmeta">${count} regel${count !== 1 ? 's' : ''}</div>
        <span class="badge ${p.brontype === 'AFAS koppeling' ? 'badge-auto' : p.brontype === 'CSV / Excel' ? 'badge-csv' : 'badge-mail'}">${p.brontype || '—'}</span>
      </div>`;
    }).join('');

    const prod = producten.find(p => p.naam === activeProduct);
    const mappings = allMappings.filter(m => m.fields.Product === activeProduct);

    let editorHtml = '';
    if (prod?.brontype === 'AFAS koppeling') {
      editorHtml = `<div class="empty-state" style="color:var(--ts-success)">✓ Dit product heeft een directe AFAS-koppeling — geen kolom mapping nodig.</div>`;
    } else {
      editorHtml = `
        <div class="card-header">
          <h2>Mapping regels — ${activeProduct}</h2>
          <button class="btn btn-primary btn-sm" onclick="addMappingRegel()">+ Regel toevoegen</button>
        </div>
        <div class="card-body" style="padding:0">
          <table class="tbl">
            <thead><tr><th>CSV kolom</th><th>CSV waarde</th><th>AFAS abonnement-ID</th><th>AFAS debiteur</th><th></th></tr></thead>
            <tbody id="mappingTbody">
              ${mappings.length === 0
                ? `<tr><td colspan="5" style="text-align:center;color:var(--ts-muted);padding:20px">Nog geen regels — klik op Regel toevoegen</td></tr>`
                : mappings.map(m => `
                <tr data-id="${m.id}">
                  <td><input value="${m.fields.CSVKolom || ''}" onchange="markDirty(this)" placeholder="bijv. Subscription Name" /></td>
                  <td><input value="${m.fields.CSVWaarde || ''}" onchange="markDirty(this)" placeholder="bijv. Gold" /></td>
                  <td><input value="${m.fields.AFASAbonnementID || ''}" onchange="markDirty(this)" placeholder="bijv. ABO-2041" /></td>
                  <td><input value="${m.fields.AFASDebiteur || ''}" onchange="markDirty(this)" placeholder="optioneel" /></td>
                  <td><button class="btn btn-danger btn-sm" onclick="deleteRegel('${m.id}', this)">Verwijder</button></td>
                </tr>`).join('')
              }
            </tbody>
          </table>
        </div>
        ${mappings.length > 0 ? `<div style="padding:12px 18px;border-top:1px solid var(--ts-border)"><button class="btn btn-primary btn-sm" onclick="saveMappings()">Wijzigingen opslaan</button></div>` : ''}`;
    }

    c.innerHTML = `
      <div class="product-grid">${productTiles}</div>
      <div class="card">${editorHtml}</div>`;
  } catch(e) { c.innerHTML = `<div class="empty-state">Fout: ${e.message}</div>`; }
}

function selectProduct(naam) {
  activeProduct = naam;
  renderMapping();
}

function markDirty(el) { el.closest('tr').dataset.dirty = '1'; }

async function addMappingRegel() {
  try {
    await graph('POST', `/sites/${siteId}/lists/MappingRegels/items`, {
      fields: { Title: `${activeProduct} - nieuw`, Product: activeProduct, CSVKolom: '', CSVWaarde: '', AFASAbonnementID: '', AFASDebiteur: '', Actief: true }
    });
    showToast('Regel toegevoegd', 'success');
    renderMapping();
  } catch(e) { showToast('Fout: ' + e.message, 'error'); }
}

async function saveMappings() {
  const rows = document.querySelectorAll('#mappingTbody tr[data-dirty="1"]');
  if (!rows.length) { showToast('Geen wijzigingen', ''); return; }
  try {
    for (const row of rows) {
      const id = row.dataset.id;
      const inputs = row.querySelectorAll('input');
      await graph('PATCH', `/sites/${siteId}/lists/MappingRegels/items/${id}`, {
        fields: { CSVKolom: inputs[0].value, CSVWaarde: inputs[1].value, AFASAbonnementID: inputs[2].value, AFASDebiteur: inputs[3].value }
      });
    }
    showToast(`${rows.length} regel(s) opgeslagen`, 'success');
    renderMapping();
  } catch(e) { showToast('Fout bij opslaan: ' + e.message, 'error'); }
}

async function deleteRegel(id, btn) {
  if (!confirm('Regel verwijderen?')) return;
  btn.disabled = true;
  try {
    await graph('DELETE', `/sites/${siteId}/lists/MappingRegels/items/${id}`);
    showToast('Regel verwijderd', 'success');
    renderMapping();
  } catch(e) { showToast('Fout: ' + e.message, 'error'); btn.disabled = false; }
}

// ── AFAS Sync ─────────────────────────────────────────────────────────────────
const AFAS_BASE = 'https://36333.rest.afas.online/ProfitRestServices';
let afasToken = '';
let syncStep = 1;
let excelRows = [];
let orgMappings = {};      // org naam → AFAS VerkoopRelID
let itemMappings = {};     // billing type → AFAS Itemcode
let afasRelaties = [];
let afasItems = [];
let afasRegels = [];
let diffResult = [];

function afasHeaders() {
  const b64 = btoa(afasToken);
  return { 'Authorization': `AfasToken ${b64}`, 'Content-Type': 'application/json' };
}

async function afasGet(connector) {
  const url = `${AFAS_BASE}/connectors/${connector}?skip=0&take=10000`;
  const r = await fetch(url, { headers: afasHeaders() });
  if (!r.ok) throw new Error(`AFAS ${connector}: ${r.status}`);
  const d = await r.json();
  return d.rows || [];
}

async function afasGetFiltered(connector, fieldId, value) {
  const url = `${AFAS_BASE}/connectors/${connector}?skip=0&take=10000&filterfieldids=${fieldId}&filtervalues=${encodeURIComponent(value)}&operatortypes=1`;
  const r = await fetch(url, { headers: afasHeaders() });
  if (!r.ok) throw new Error(`AFAS ${connector} filter: ${r.status}`);
  const d = await r.json();
  return d.rows || [];
}

async function fetchRegelsByLineIds(lineIds) {
  // Fetch in batches of 10 using OR filter
  const results = [];
  const batchSize = 50;
  for (let i = 0; i < lineIds.length; i += batchSize) {
    const batch = lineIds.slice(i, i + batchSize);
    const values = batch.join(';');
    const ops = batch.map(() => '1').join(';');
    const url = `${AFAS_BASE}/connectors/PowerP_Abonnementregels?skip=0&take=500&filterfieldids=Regelnummer&filtervalues=${values}&operatortypes=${ops}`;
    const r = await fetch(url, { headers: afasHeaders() });
    if (r.ok) {
      const d = await r.json();
      results.push(...(d.rows || []));
    }
  }
  return results;
}

function renderSync() {
  const c = document.getElementById('mainContent');
  c.innerHTML = `
    <div class="step-indicator">
      <div class="step-dot ${syncStep >= 1 ? (syncStep > 1 ? 'done' : 'active') : ''}" id="step1dot">1. Bestand & token</div>
      <div class="step-dot ${syncStep >= 2 ? (syncStep > 2 ? 'done' : 'active') : ''}" id="step2dot">2. Koppelen${excelRows.every(r=>r.lineId) ? ' (overgeslagen)' : ''}</div>

      <div class="step-dot ${syncStep >= 4 ? 'active' : ''}" id="step4dot">4. Sync</div>
    </div>
    <div id="sync-content"></div>`;
  renderSyncStep();
}

  if (syncStep === 1) renderStep1(c);

}

async function handleFileUpload(input) {
  const file = input.files[0];
  if (!file) return;
  afasToken = document.getElementById('afasTokenInput').value;

  // Parse CSV or Excel
  if (file.name.endsWith('.csv')) {
    const text = await file.text();
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim().replace(/"/g,''));
    excelRows = lines.slice(1).map(line => {
      const cols = line.split(',').map(c => c.trim().replace(/"/g,''));
      const row = {};
      headers.forEach((h,i) => row[h] = cols[i]);
      return {
        org: row['Organization'] || row['organization'] || '',
        billingType: row['Billing Type'] || row['billing_type'] || row['BillingType'] || '',
        seats: parseFloat(row['Seats'] || row['seats'] || 0),
        endDate: row['End Date'] || row['end_date'] || row['EndDate'] || '',
        raw: row
      };
    }).filter(r => r.org);
  } else {
    // Excel via SheetJS
    const buf = await file.arrayBuffer();
    const XLSX = await import('https://cdn.sheetjs.com/xlsx-0.20.1/package/xlsx.mjs');
    const wb = XLSX.read(buf);
    const ws = wb.Sheets[wb.SheetNames[0]];
    const data = XLSX.utils.sheet_to_json(ws);
    excelRows = data.map(row => ({
      org: row['Customer'] || row['Organization'] || '',
      billingType: row['Product'] || row['Billing Type'] || '',
      seats: parseFloat(row['Quantity'] || row['Seats'] || 0),
      startDate: row['Start date'] || row['Start Date'] || '',
      endDate: row['End date'] || row['End Date'] || '',
      discount: parseFloat(row['Discount %'] || row['Discount'] || 0) || 0,
      lineId: String(row['Subscription Line ID'] || row['Regelnummer'] || '').replace(/[.,]/g,'').replace(/\.0$/,''),
      raw: row
    })).filter(r => r.org && r.billingType && r.seats > 0);
  }
  renderSyncStep();
}

async function goStep2() {
  afasToken = document.getElementById('afasTokenInput').value;
  if (!afasToken) { showToast('Vul eerst het AFAS token in', 'error'); return; }

  const c = document.getElementById('sync-content');
  c.innerHTML = '<div class="loader"><div class="spinner"></div> AFAS data ophalen...</div>';

  // Check if all rows have a lineId — skip koppelstap if so
  const allHaveLineId = excelRows.every(r => r.lineId);

  try {
    if (allHaveLineId) {
      // Fetch all abonnementregels
      afasRegels = await afasGet('PowerP_Abonnementregels');
      await buildDiffFromLineIds();
      syncStep = 3;
    } else {
      [afasRelaties, afasItems] = await Promise.all([
        afasGet('PowerP_Verkooprelaties'),
        afasGet('PowerP_Items'),
      ]);
      // Load saved org mappings from SharePoint
      try {
        const spData = await graph('GET', `/sites/${siteId}/lists/OrgMappings/items?$expand=fields&$top=500`);
        (spData.value || []).forEach(i => { orgMappings[i.fields.Title] = i.fields.AFASVerkoopRelID; });
      } catch(e) {}
      // Load saved item mappings
      try {
        const mapData = await graph('GET', `/sites/${siteId}/lists/MappingRegels/items?$expand=fields&$top=500`);
        (mapData.value || []).forEach(i => { if (i.fields.CSVWaarde) itemMappings[i.fields.CSVWaarde] = i.fields.AFASAbonnementID; });
      } catch(e) {}
      syncStep = 2;
    }
    renderSyncStep();
  } catch(e) { showToast('AFAS fout: ' + e.message, 'error'); renderSyncStep(); }
}

async function buildDiffFromLineIds() {
  diffResult = [];
  for (const row of excelRows) {
    const existing = afasRegels.find(r => String(r.Regelnummer).replace(/[.,]/g,'') === String(row.lineId).replace(/[.,]/g,''));
    if (!existing) {
      diffResult.push({ ...row, status: 'no_match', afasRegel: null });
    } else if (
      Math.abs(existing.Aantal - row.seats) > 0.01 ||
      (row.endDate && row.endDate !== '') ||
      (row.discount && Math.abs((existing.Korting||0) - row.discount) > 0.01)
    ) {
      diffResult.push({ ...row, relId: existing.OrganisatieId, itemcode: existing.Itemcode, status: 'changed', afasRegel: existing, oldSeats: existing.Aantal });
    } else {
      diffResult.push({ ...row, relId: existing.OrganisatieId, itemcode: existing.Itemcode, status: 'ok', afasRegel: existing });
    }
  }
}

let ignoredRows = new Set();

function isRegelActief(r) {
  if (!r.Einddatum) return true;
  const eind = r.Einddatum.substring(0,10);
  const gefact = r.Gefactureerd_tm ? r.Gefactureerd_tm.substring(0,10) : null;
  const facVanaf = r.Factureren_vanaf ? r.Factureren_vanaf.substring(0,10) : null;

  // Niet actief als factureren_vanaf >= einddatum (nooit gefactureerd, direct beëindigd)
  if (facVanaf && eind && facVanaf >= eind) return false;

  // Actief als einddatum in de toekomst ligt (na vandaag)
  const vandaag = new Date().toISOString().split('T')[0];
  if (eind > vandaag) return true;

  // Actief als einddatum na gefactureerd_tm (nog niet volledig gefactureerd)
  if (!gefact) return true;
  return eind > gefact;
}

function isKortingsregelOk(kortingRegel, hoofdRegels) {
  // Kortingsregel is OK als:
  // 1. Geen einddatum (loopt door)
  // 2. Einddatum gelijk aan einddatum van een van de hoofdregels
  if (!kortingRegel.Einddatum) return false; // geen einddatum = nog te beoordelen
  const kortingEind = kortingRegel.Einddatum.substring(0,10);
  return hoofdRegels.some(r => r.Einddatum && r.Einddatum.substring(0,10) === kortingEind);
} // set of "org|billingType" keys

function toggleIgnore(key, btn) {
  if (ignoredRows.has(key)) {
    ignoredRows.delete(key);
    btn.textContent = 'Negeer';
    btn.classList.remove('btn-secondary');
    btn.classList.add('btn-danger');
    const row = btn.closest('tr');
    row.classList.remove('diff-ignored');
    // restore original status badge
    const badge = row.querySelector('.diff-badge');
    if (badge) badge.style.display = '';
  } else {
    ignoredRows.add(key);
    btn.textContent = 'Herstellen';
    btn.classList.remove('btn-danger');
    btn.classList.add('btn-secondary');
    const row = btn.closest('tr');
    row.classList.add('diff-ignored');
    const badge = row.querySelector('.diff-badge');
    if (badge) badge.style.display = 'none';
    row.querySelector('.ignore-badge').style.display = '';
  }
  // update sync button count
  const toSync = diffResult.filter(r => (r.status === 'new' || r.status === 'changed') && !ignoredRows.has(r.org + '|' + r.billingType));
  const syncBtn = document.getElementById('syncPreviewBtn');
  if (syncBtn) syncBtn.textContent = `Sync uitvoeren (${toSync.length} wijzigingen) →`;
  if (syncBtn) syncBtn.disabled = toSync.length === 0;
}

function filterItemDropdown(input, selectId) {
  const q = input.value.toLowerCase();
  const sel = document.getElementById(selectId);
  if (!sel) return;
  Array.from(sel.options).forEach(opt => {
    opt.style.display = !q || opt.text.toLowerCase().includes(q) || opt.value.toLowerCase().includes(q) ? '' : 'none';
  });
}

async function saveMappingsAndPreview() {
  const c = document.getElementById('sync-content');

  // Collect org mappings
  const uniqueOrgs = [...new Set(excelRows.map(r => r.org))];
  uniqueOrgs.forEach(org => {
    const key = btoa(org).replace(/=/g,'');
    const sel = document.getElementById(`orgmap_${key}`);
    if (sel?.value) orgMappings[org] = sel.value;
  });

  // Collect item mappings
  const uniqueTypes = [...new Set(excelRows.map(r => r.billingType))];
  uniqueTypes.forEach(type => {
    const key = btoa(type).replace(/=/g,'');
    const sel = document.getElementById(`typemap_${key}`);
    if (sel?.value) itemMappings[type] = sel.value;
  });

  c.innerHTML = '<div class="loader"><div class="spinner"></div> Mappings opslaan & AFAS vergelijken...</div>';

  // Save org mappings to SharePoint OrgMappings list
  try {
    for (const [org, relId] of Object.entries(orgMappings)) {
      await graph('POST', `/sites/${siteId}/lists/OrgMappings/items`, {
        fields: { Title: org, AFASVerkoopRelID: relId, Product: 'Knowbe4' }
      }).catch(() => {}); // ignore duplicates
    }
  } catch(e) {}

  // Save item mappings to MappingRegels
  try {
    for (const [type, itemcode] of Object.entries(itemMappings)) {
      await graph('POST', `/sites/${siteId}/lists/MappingRegels/items`, {
        fields: { Title: `Knowbe4 - ${type}`, Product: 'Knowbe4', CSVWaarde: type, AFASAbonnementID: itemcode }
      }).catch(() => {});
    }
  } catch(e) {}

  // Fetch current AFAS abonnementregels for mapped relaties
  try {
    const relIds = Object.values(orgMappings);
    // Fetch all abonnementregels
    afasRegels = await afasGet('PowerP_Abonnementregels');
    afasRegels = afasRegels.filter(r => relIds.includes(r.OrganisatieId));
  } catch(e) { showToast('AFAS fout bij ophalen regels: ' + e.message, 'error'); return; }

  // Build diff
  diffResult = [];
  for (const row of excelRows) {
    const relId = orgMappings[row.org];
    const itemcode = itemMappings[row.billingType];
    if (!relId || !itemcode) {
      diffResult.push({ ...row, status: 'no_mapping', afasRegel: null });
      continue;
    }
    // Match on lineId directly if provided, otherwise match on relId + itemcode
    let existing;
    if (row.lineId) {
      existing = afasRegels.find(r => String(r.Regelnummer).replace(/[.,]/g,'') === String(row.lineId).replace(/[.,]/g,''));
    } else {
      existing = afasRegels.find(r => r.OrganisatieId === relId && r.Itemcode === itemcode);
    }
    if (!existing) {
      diffResult.push({ ...row, relId, itemcode, status: 'new', afasRegel: null });
    } else if (Math.abs(existing.Aantal - row.seats) > 0.01 || (row.endDate && row.endDate !== '') || (row.discount && Math.abs((existing.Korting||0) - row.discount) > 0.01)) {
      diffResult.push({ ...row, relId, itemcode, status: 'changed', afasRegel: existing, oldSeats: existing.Aantal });
    } else {
      diffResult.push({ ...row, relId, itemcode, status: 'ok', afasRegel: existing });
    }
  }

  syncStep = 3;
  renderSyncStep();
}

function toggleRegelDetail() {

  const toggle = document.getElementById('regelDetailToggle');
  if (content.style.display === 'none') {
    content.style.display = '';
    toggle.textContent = '▲ Inklappen';
  } else {
    content.style.display = 'none';
    toggle.textContent = '▼ Uitklappen om te controleren';
  }
}

function heeft50Pct(r) {
  if (!r.Afwijkende_prijs || parseFloat(r.Afwijkende_prijs) === 0) return parseFloat(r.Korting||0) === 50;
  return Math.abs(parseFloat(r.Korting||0) / parseFloat(r.Afwijkende_prijs) * 100 - 50) < 0.5;
}

function renderKortingDetailRows() {
  const allRegels = kortingAnalyse.flatMap(a =>
    a.regels.filter(r => isRegelActief(r)).map(r => ({ ...r, _naam: a.naam, _aboNr: a.aboNr }))
  );
  const metKort = allRegels.filter(r => r.Itemcode === 'KORT-TO-ABB').length;
  const met50 = allRegels.filter(r => r.Itemcode !== 'KORT-TO-ABB' && heeft50Pct(r)).length;
  const zonder50 = allRegels.filter(r => r.Itemcode !== 'KORT-TO-ABB' && !heeft50Pct(r)).length;

  const summary = document.getElementById('regelDetailSummary');
  if (summary) summary.innerHTML = `
    <span style="color:var(--ts-success)">✓ Met 50%: ${met50} regels</span>
    <span style="color:var(--ts-warning)">✕ Zonder 50%: ${zonder50} regels</span>
    <span style="color:var(--ts-danger)">⚠ KORT-TO-ABB actief: ${metKort} regels</span>`;

  return allRegels.map(r => {
    const isKort = r.Itemcode === 'KORT-TO-ABB';
    const h50 = !isKort && heeft50Pct(r);
    const kortPct = (r.Korting && r.Afwijkende_prijs && parseFloat(r.Afwijkende_prijs) !== 0)
      ? Math.abs(parseFloat(r.Korting) / parseFloat(r.Afwijkende_prijs) * 100).toFixed(2) + '%'
      : '—';
    const bg = isKort ? 'var(--ts-danger-bg)' : !h50 ? 'var(--ts-warning-bg)' : '';
    const statusLabel = isKort ? '⚠ KORT-TO-ABB' : h50 ? '✓ 50% OK' : '✕ Geen 50%';
    const statusColor = isKort ? 'var(--ts-danger)' : h50 ? 'var(--ts-success)' : 'var(--ts-warning)';
    return `<tr style="background:${bg}">
      <td><span class="tag">${r._aboNr}</span></td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis" title="${r._naam}">${r._naam}</td>
      <td style="font-size:11px;color:var(--ts-muted)">${r.Regelnummer}</td>
      <td><code style="font-size:11px;background:var(--ts-bg);padding:1px 5px;border-radius:3px">${r.Itemcode||'—'}</code></td>
      <td style="font-size:11px">${r.Basiseenheid||'—'}</td>
      <td>${r.Aantal||0}</td>
      <td>${r.Afwijkende_prijs ? '€'+parseFloat(r.Afwijkende_prijs).toFixed(2) : '—'}</td>
      <td style="font-weight:500">${kortPct}</td>
      <td>${r.Waarde_abonnement ? '€'+parseFloat(r.Waarde_abonnement).toFixed(2) : '—'}</td>
      <td><span style="font-size:11px;font-weight:600;color:${statusColor}">${statusLabel}</span></td>
    </tr>`;
  }).join('');
}


async function startSync() {
  document.getElementById('startSyncBtn').disabled = true;
  const toSync = diffResult.filter(r => (r.status === 'new' || r.status === 'changed') && !ignoredRows.has(r.org + '|' + r.billingType));
  const log = document.getElementById('syncLog');
  const bar = document.getElementById('syncProgress');
  let done = 0;

  for (const row of toSync) {
    try {
      if (row.status === 'changed') {
        // Update bestaande regel via UpdateConnector
        const lineFields = { "Qu": row.seats };
        if (row.endDate) {
          lineFields["DaEn"] = new Date(row.endDate).toISOString().split('T')[0];
          lineFields["VaRs"] = "03";
        }
        if (row.discount) lineFields["DcPr"] = row.discount;
        const body = {
          "FbSubscription": {
            "Element": {
              "Fields": { "SuNr": row.afasRegel.Nummer_abonnement },
              "Objects": {
                "FbSubscriptionLines": {
                  "Element": {
                    "Fields": { "Id": parseInt(row.afasRegel.Regelnummer), ...lineFields }
                  }
                }
              }
            }
          }
        };
        const r = await fetch(`${AFAS_BASE}/connectors/FbSubscription`, {
          method: 'PUT',
          headers: afasHeaders(),
          body: JSON.stringify(body)
        });
        if (r.ok) {
          log.innerHTML += `<div style="color:var(--ts-success)">✓ ${row.org} — Seats bijgewerkt: ${row.oldSeats} → ${row.seats}</div>`;
        } else {
          const err = await r.text();
          log.innerHTML += `<div style="color:var(--ts-danger)">✗ ${row.org} — Fout: ${err.substring(0,100)}</div>`;
        }
      } else if (row.status === 'new') {
        log.innerHTML += `<div style="color:var(--ts-warning)">⚠ ${row.org} — Nieuw abonnement aanmaken vereist handmatige actie in AFAS (nog niet geautomatiseerd)</div>`;
      }
    } catch(e) {
      log.innerHTML += `<div style="color:var(--ts-danger)">✗ ${row.org} — ${e.message}</div>`;
    }
    done++;
    bar.style.width = `${Math.round(done/toSync.length*100)}%`;
    log.scrollTop = log.scrollHeight;
  }
  log.innerHTML += `<div style="margin-top:8px;font-weight:600;color:var(--ts-blue)">── Sync voltooid ──</div>`;
  showToast('Sync klaar!', 'success');
}

// ── Abonnementsregels ────────────────────────────────────────────────────────
let alleRegels = [];
let gefilterdRegels = [];
let regelsSortField = 'Regelnummer';
let regelsSortDir = 1;
let regelFilters = { klant: '', product: '', type: '', abonNr: '', regelNr: '', status: 'actief' };
let editingRegel = null;
let afasTokenRegels = '';

async function renderRegels() {
  const c = document.getElementById('mainContent');
  document.getElementById('topActions').innerHTML = `
    <input type="password" id="afasTokenRegelsInput" placeholder="AFAS token" value="${afasTokenRegels}"
      style="font-size:12px;padding:5px 10px;border:1px solid var(--ts-border);border-radius:var(--radius);width:220px"
      oninput="afasTokenRegels=this.value" />
    <button class="btn btn-primary btn-sm" onclick="laadRegels()">↻ Laden</button>`;

  if (alleRegels.length === 0) {
    c.innerHTML = `<div class="empty-state">Vul het AFAS token in en klik op Laden.</div>`;
    return;
  }
  renderRegelsTable(c);
}

async function laadRegels() {
  afasTokenRegels = document.getElementById('afasTokenRegelsInput')?.value || afasTokenRegels;
  if (!afasTokenRegels) { showToast('Vul eerst het AFAS token in', 'error'); return; }
  afasToken = afasTokenRegels;
  const c = document.getElementById('mainContent');
  c.innerHTML = '<div class="loader"><div class="spinner"></div> Abonnementsregels ophalen (kan even duren)...</div>';
  try {
    alleRegels = await afasGet('PowerP_Abonnementregels');
    gefilterdRegels = [...alleRegels];
    renderRegelsTable(c);
    showToast(`${alleRegels.length} regels geladen`, 'success');
  } catch(e) { c.innerHTML = `<div class="empty-state">Fout: ${e.message}</div>`; }
}

function renderRegelsTable(c) {
  applyRegelFilters();

  c.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:13px;color:var(--ts-muted)">Selecteer regels voor bulk acties</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary btn-sm" onclick="selecteerAlleZichtbaar()">Alles selecteren</button>
        <button class="btn btn-secondary btn-sm" onclick="deselecteerAlle()">Deselecteer</button>
        <button class="btn btn-sm" style="background:var(--ts-danger-bg);color:var(--ts-danger);border:1px solid #fecaca" onclick="bulkBeeindigen()">🚫 Beëindigen (<span id="selectCount">0</span>)</button>
        <button class="save-row-btn" onclick="bulkKortingToepassen()">% 50% Korting (<span id="selectCount2">0</span>)</button>
      </div>
    </div>
    <div class="filter-bar">
      <input placeholder="🔍 Klant" value="${regelFilters.klant}" oninput="regelFilters.klant=this.value;applyRegelFilters();updateRegelstbody()" style="flex:1;min-width:140px" />
      <input placeholder="🔍 Product / itemcode" value="${regelFilters.product}" oninput="regelFilters.product=this.value;applyRegelFilters();updateRegelstbody()" style="flex:1;min-width:140px" />
      <select onchange="regelFilters.type=this.value;applyRegelFilters();updateRegelstbody()">
        <option value="">Alle types</option>
        ${uniqueTypes.map(t => `<option value="${t}" ${regelFilters.type===t?'selected':''}>${t}</option>`).join('')}
      </select>
      <input placeholder="Abonnement nr" value="${regelFilters.abonNr}" oninput="regelFilters.abonNr=this.value;applyRegelFilters();updateRegelstbody()" style="width:120px" />
      <input placeholder="Regel nr" value="${regelFilters.regelNr}" oninput="regelFilters.regelNr=this.value;applyRegelFilters();updateRegelstbody()" style="width:100px" />
      <input placeholder="🔍 Regelomschrijving" value="${regelFilters.omschrijving||''}" oninput="regelFilters.omschrijving=this.value;applyRegelFilters();updateRegelstbody()" style="min-width:160px;flex:1" />
      <select onchange="regelFilters.status=this.value;applyRegelFilters();updateRegelstbody()">
        <option value="actief" ${regelFilters.status==='actief'?'selected':''}>Alleen actief</option>
        <option value="inactief" ${regelFilters.status==='inactief'?'selected':''}>Alleen inactief</option>
        <option value="alle" ${regelFilters.status==='alle'?'selected':''}>Alle regels</option>
      </select>
      <span class="regels-count" id="regelsCount">${gefilterdRegels.length} / ${alleRegels.length} regels</span>
    </div>
    <div class="tbl-wrapper">
      <table class="regels-tbl">
        <thead>
          <tr>
            <th><input type='checkbox' onclick='toggleAlleCheckboxes(this)' /></th>
            ${['Regelnummer','Nummer_abonnement','Type_abonnement','Naam','Itemcode','Basiseenheid','Begindatum','Einddatum','Gefactureerd_tm','Factureren_vanaf','Aantal','Originele_prijs','Afwijkende_prijs','Korting','PrijsInclKorting','Waarde_abonnement','Regel_Omschrijving'].map(f => `
            <th onclick="sortRegels('${f}')" class="${regelsSortField===f?'sorted':''}">
              ${f==='Regelnummer'?'Regel nr':f==='Nummer_abonnement'?'Abo nr':f==='Type_abonnement'?'Type':f==='Naam'?'Klant':f==='Itemcode'?'Product':f==='Basiseenheid'?'Cyclus':f==='Begindatum'?'Startdatum':f==='Einddatum'?'Einddatum':f==='Gefactureerd_tm'?'Gefact. t/m':f==='Factureren_vanaf'?'Factuur vanaf':f==='Aantal'?'Aantal':f==='Originele_prijs'?'Basisprijs':f==='Afwijkende_prijs'?'Prijs':f==='Korting'?'Korting %':f==='PrijsInclKorting'?'Prijs incl. korting':f==='Waarde_abonnement'?'Regelwaarde':f==='Regel_Omschrijving'?'Regelomschrijving':f}

function applyRegelFilters() {
  gefilterdRegels = alleRegels.filter(r => {
    if (regelFilters.klant && !r.Naam?.toLowerCase().includes(regelFilters.klant.toLowerCase())) return false;
    if (regelFilters.product && !r.Itemcode?.toLowerCase().includes(regelFilters.product.toLowerCase()) && !r.Omschrijving?.toLowerCase().includes(regelFilters.product.toLowerCase())) return false;
    if (regelFilters.type && r.Type_abonnement !== regelFilters.type) return false;
    if (regelFilters.abonNr && String(r.Nummer_abonnement) !== regelFilters.abonNr) return false;
    if (regelFilters.regelNr && !String(r.Regelnummer).includes(regelFilters.regelNr)) return false;
    if (regelFilters.omschrijving && !r.Regel_Omschrijving?.toLowerCase().includes(regelFilters.omschrijving.toLowerCase())) return false;
    if (regelFilters.status === 'actief' && !isRegelActief(r)) return false;
    if (regelFilters.status === 'inactief' && isRegelActief(r)) return false;
    return true;
  });
  // Sort
  gefilterdRegels.sort((a, b) => {
    const av = a[regelsSortField] ?? '';
    const bv = b[regelsSortField] ?? '';
    if (typeof av === 'number') return (av - bv) * regelsSortDir;
    return String(av).localeCompare(String(bv)) * regelsSortDir;
  });
}

function sortRegels(field) {
  if (regelsSortField === field) regelsSortDir *= -1;
  else { regelsSortField = field; regelsSortDir = 1; }
  applyRegelFilters();
  updateRegelsCount();
  document.getElementById('regelsTbody').innerHTML = renderRegelRows();
  // Re-render header for sort indicators
  document.querySelectorAll('.regels-tbl th').forEach((th, i) => {
    const fields = ['Regelnummer','Nummer_abonnement','Type_abonnement','Naam','Itemcode','Aantal','Afwijkende_prijs','Korting','Regel_Omschrijving'];
    const f = fields[i];
    if (!f) return;
    th.className = regelsSortField === f ? 'sorted' : '';
    th.querySelector('.sort-icon').textContent = regelsSortField===f?(regelsSortDir===1?'↑':'↓'):'↕';
  });
}

function updateRegelsCount() {
  const el = document.getElementById('regelsCount');
  if (el) el.textContent = `${gefilterdRegels.length} / ${alleRegels.length} regels`;
}

function updateRegelstbody() {
  updateRegelsCount();
  document.getElementById('regelsTbody').innerHTML = renderRegelRows();
}

function renderRegelRows() {
  if (gefilterdRegels.length === 0) return `<tr><td colspan="10" class="empty-state">Geen regels gevonden</td></tr>`;
  return gefilterdRegels.slice(0, 500).map(r => {
    const isEditing = editingRegel === r.Regelnummer;
    const fmtDate = d => d ? d.substring(0,10) : '—';
    const fmtEur  = v => v ? '€'+parseFloat(v).toFixed(2) : '—';
    const kortingPct = (r.Korting && r.Afwijkende_prijs && parseFloat(r.Afwijkende_prijs) !== 0)
      ? Math.abs(parseFloat(r.Korting) / parseFloat(r.Afwijkende_prijs) * 100)
      : 0;
    const prijsInclKorting = r.Afwijkende_prijs
      ? '€'+(parseFloat(r.Afwijkende_prijs) * (1 - kortingPct/100)).toFixed(2)
      : fmtEur(r.Afwijkende_prijs);
    return `<tr class="${isEditing ? 'editing' : ''}" data-id="${r.Regelnummer}">
      <td><input type="checkbox" class="regel-cb" data-id="${r.Regelnummer}" data-abo="${r.Nummer_abonnement}" data-gefact="${r.Gefactureerd_tm||''}" onchange="updateSelectCount()" /></td>
      <td><span class="tag">${r.Regelnummer}</span></td>
      <td>${r.Nummer_abonnement}</td>
      <td><span class="badge badge-csv" style="font-size:10px">${r.Type_abonnement||'—'}</span></td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis" title="${r.Naam||''}">${r.Naam||'—'}</td>
      <td><code style="font-size:11px;background:var(--ts-bg);padding:1px 5px;border-radius:3px">${r.Itemcode||'—'}</code></td>
      <td style="font-size:11px;color:var(--ts-muted)">${r.Basiseenheid||'—'}</td>
      <td style="font-size:11px">${fmtDate(r.Begindatum)}</td>
      <td style="font-size:11px;color:${r.Einddatum?'var(--ts-warning)':'inherit'}">${fmtDate(r.Einddatum)}</td>
      <td style="font-size:11px">${fmtDate(r.Gefactureerd_tm)}</td>
      <td style="font-size:11px;color:var(--ts-muted)">${fmtDate(r.Factureren_vanaf)}</td>
      <td>${isEditing
        ? `<input class="inline-input" id="edit_aantal_${r.Regelnummer}" value="${r.Aantal||0}" type="number" style="width:70px" />`
        : (r.Aantal||0)}</td>
      <td style="font-size:11px;color:var(--ts-muted)">${fmtEur(r.Originele_prijs)}</td>
      <td>${isEditing
        ? `<input class="inline-input" id="edit_prijs_${r.Regelnummer}" value="${r.Afwijkende_prijs||''}" type="number" step="0.01" style="width:90px" />`
        : fmtEur(r.Afwijkende_prijs)}</td>
      <td>${isEditing
        ? `<input class="inline-input" id="edit_korting_${r.Regelnummer}" value="${r.Korting && r.Afwijkende_prijs ? Math.abs(parseFloat(r.Korting)/parseFloat(r.Afwijkende_prijs)*100).toFixed(2) : 0}" type="number" step="0.01" style="width:70px" />`
        : (() => {
          if (!r.Korting || !r.Afwijkende_prijs || parseFloat(r.Afwijkende_prijs) === 0) return '—';
          const pct = Math.abs(parseFloat(r.Korting) / parseFloat(r.Afwijkende_prijs) * 100);
          return pct.toFixed(2) + '%';
        })()}</td>
      <td style="font-size:11px">${prijsInclKorting}</td>
      <td style="font-weight:500">${fmtEur(r.Waarde_abonnement)}</td>
      <td style="min-width:160px">${isEditing
        ? `<input class="inline-input" id="edit_omschrijving_${r.Regelnummer}" value="${(r.Regel_Omschrijving||'').replace(/"/g,'&quot;')}" style="width:180px" />`
        : (r.Regel_Omschrijving||'—')}</td>
      <td style="white-space:nowrap">
        ${isEditing
          ? `<button class="save-row-btn" onclick="saveRegel(${r.Regelnummer},${r.Nummer_abonnement})">Opslaan</button>
             <button class="cancel-row-btn" onclick="cancelEditRegel()">Annuleren</button>`
          : `<button class="edit-btn" onclick="startEditRegel(${r.Regelnummer})" title="Bewerken">✏️</button>
             <button class="edit-btn" onclick="openBeeindigenModal(${r.Regelnummer},${r.Nummer_abonnement},'${(r.Naam||'').replace(/'/g,"\'")}','${r.Itemcode||''}')" title="Beëindigen" style="color:var(--ts-danger)">🚫</button>`}
      </td>
    </tr>`;
  }).join('');
}

function startEditRegel(regelnummer) {
  editingRegel = regelnummer;
  document.getElementById('regelsTbody').innerHTML = renderRegelRows();
}

function cancelEditRegel() {
  editingRegel = null;
  document.getElementById('regelsTbody').innerHTML = renderRegelRows();
}

async function saveRegel(regelnummer, aboNummer) {
  const aantal = parseFloat(document.getElementById(`edit_aantal_${regelnummer}`)?.value);
  const prijs = parseFloat(document.getElementById(`edit_prijs_${regelnummer}`)?.value);
  const korting = parseFloat(document.getElementById(`edit_korting_${regelnummer}`)?.value);
  const omschrijving = document.getElementById(`edit_omschrijving_${regelnummer}`)?.value;

  const lineFields = { "Id": parseInt(regelnummer) };
  if (!isNaN(aantal)) lineFields["Qu"] = aantal;
  if (!isNaN(prijs) && prijs > 0) lineFields["Pric"] = prijs;
  if (!isNaN(korting)) lineFields["DcPr"] = korting;
  if (omschrijving !== undefined) lineFields["U62872DFA07C24735AABDF3FC24D5DBC3"] = omschrijving;

  const body = {
    "FbSubscription": {
      "Element": {
        "Fields": { "SuNr": aboNummer },
        "Objects": {
          "FbSubscriptionLines": {
            "Element": { "Fields": lineFields }
          }
        }
      }
    }
  };

  try {
    const r = await fetch(`${AFAS_BASE}/connectors/FbSubscription`, {
      method: 'PUT',
      headers: { 'Authorization': `AfasToken ${btoa(afasTokenRegels)}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (r.ok || r.status === 204) {
      // Update local data
      const idx = alleRegels.findIndex(r => r.Regelnummer === regelnummer);
      if (idx >= 0) {
        if (!isNaN(aantal)) alleRegels[idx].Aantal = aantal;
        if (!isNaN(prijs) && prijs > 0) alleRegels[idx].Afwijkende_prijs = prijs;
        if (!isNaN(korting)) alleRegels[idx].Korting = korting;
        if (omschrijving !== undefined) alleRegels[idx].Regel_Omschrijving = omschrijving;
      }
      editingRegel = null;
      applyRegelFilters();
      document.getElementById('regelsTbody').innerHTML = renderRegelRows();
      showToast(`Regel ${regelnummer} opgeslagen`, 'success');
    } else {
      const err = await r.text();
      showToast(`Fout: ${err.substring(0,120)}`, 'error');
    }
  } catch(e) { showToast('Fout: ' + e.message, 'error'); }
}

async function laadKortingAnalyse() {
  afasToken = document.getElementById('afasTokenKortingInput')?.value || afasToken;
  afasTokenRegels = afasToken;
  if (!afasToken) { showToast('Vul eerst het AFAS token in', 'error'); return; }

  const c = document.getElementById('mainContent');
  c.innerHTML = '<div class="loader"><div class="spinner"></div> Verkooprelaties ophalen...</div>';

  try {
    // Fetch all verkooprelaties
    const relData = await afasGet('PowerP_Verkooprelaties');
    kortingRelaties = relData.filter(r => r.Prijslijst === 'TechOne MSP');
    const relIds = new Set(kortingRelaties.map(r => r.VerkoopRelID));

    c.innerHTML = '<div class="loader"><div class="spinner"></div> Abonnementsregels ophalen...</div>';

    // Use cached regels or fetch
    const regels = alleRegels.length > 0 ? alleRegels : await afasGet('PowerP_Abonnementregels');
    if (alleRegels.length === 0) { alleRegels = regels; }

    // Filter: only type Overig, only TechOne MSP klanten, only active
    // Exclude: negative waarde (correcties), regels met kortingspercentage
    kortingRegels = regels.filter(r =>
      r.Type_abonnement === 'Overig' &&
      relIds.has(r.OrganisatieId) &&
      r.Itemcode !== 'KORT-TO-ABB' &&
      isRegelActief(r) &&
      (parseFloat(r.Waarde_abonnement) || 0) > 0 &&
      (!r.Korting || parseFloat(r.Korting) === 0)
    );

    // Existing korting regels per abonnement
    const kortingBestaand = regels.filter(r => r.Itemcode === 'KORT-TO-ABB' && isRegelActief(r));
    const kortingPerAbo = {};
    kortingBestaand.forEach(r => {
      if (!kortingPerAbo[r.Nummer_abonnement]) kortingPerAbo[r.Nummer_abonnement] = [];
      kortingPerAbo[r.Nummer_abonnement].push(r);
    });

    // Analyse per abonnement
    const aboMap = {};
    kortingRegels.forEach(r => {
      if (!aboMap[r.Nummer_abonnement]) {
        aboMap[r.Nummer_abonnement] = {
          aboNr: r.Nummer_abonnement,
          naam: r.Naam,
          orgId: r.OrganisatieId,
          regels: [],
          kortingRegels: kortingPerAbo[r.Nummer_abonnement] || []
        };
      }
      aboMap[r.Nummer_abonnement].regels.push(r);
    });
    // Voeg ook abos toe die alleen een KORT-TO-ABB regel hebben (geen andere overig regels)
    kortingBestaand.forEach(r => {
      if (!aboMap[r.Nummer_abonnement]) {
        aboMap[r.Nummer_abonnement] = {
          aboNr: r.Nummer_abonnement,
          naam: r.Naam,
          orgId: r.OrganisatieId,
          regels: [],
          kortingRegels: kortingPerAbo[r.Nummer_abonnement] || []
        };
      }
    });

    kortingAnalyse = Object.values(aboMap).map(abo => {
      const actieveHoofdRegels = abo.regels.filter(r => isRegelActief(r) && r.Itemcode !== 'KORT-TO-ABB');
      const heeftKorting = abo.kortingRegels.length > 0;
      const alleRegelsMet50 = actieveHoofdRegels.length > 0 && actieveHoofdRegels.every(r => parseFloat(r.Korting||0) === 50);
      return { ...abo, heeftKorting, alleRegelsMet50, actief: actieveHoofdRegels.length > 0 };
    }).sort((a,b) => {
      const scoreA = (a.heeftKorting?2:0) + (!a.alleRegelsMet50?1:0);
      const scoreB = (b.heeftKorting?2:0) + (!b.alleRegelsMet50?1:0);
      return scoreB - scoreA;
    });

    renderKortingResultaat(c);
  } catch(e) { c.innerHTML = `<div class="empty-state">Fout: ${e.message}</div>`; }
}

function renderKortingResultaat(c) {
  const metKortingsregel = kortingAnalyse.filter(a => a.heeftKorting);
  const zonderKortingsregel = kortingAnalyse.filter(a => !a.heeftKorting);
  const metKorting50 = kortingAnalyse.filter(a => a.alleRegelsMet50);
  const zonderKorting50 = kortingAnalyse.filter(a => !a.alleRegelsMet50 && a.actief);

    <div class="stats-grid" style="margin-bottom:16px">

      <div class="stat-card"><div class="stat-val" style="color:var(--ts-warning)">${metKortingsregel.length}</div><div class="stat-lbl">Met KORT-TO-ABB regel</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--ts-success)">${metKorting50.length}</div><div class="stat-lbl">Alle regels 50% korting</div></div>
      <div class="stat-card"><div class="stat-val" style="color:${actieAnodig.length>0?'var(--ts-danger)':'var(--ts-success)'}">
        ${actieAnodig.length}</div><div class="stat-lbl">Actie nodig</div></div>
    </div>
    <div class="card">
      <div class="card-header">
        <h2>Korting Techone — per abonnement</h2>
        <span style="font-size:12px;color:var(--ts-muted)">Nieuwe aanpak: beëindig KORT-TO-ABB, pas 50% toe op regels</span>
      </div>
      <div class="tbl-wrapper">
        <table class="regels-tbl">
          <thead><tr>
            <th>Abo nr</th><th>Klant</th><th>Actieve regels</th><th>KORT-TO-ABB</th><th>Regels met 50%</th><th>Actie</th><th></th>
          </tr></thead>
          <tbody>
            ${kortingAnalyse.map(a => {
              const kortingEind = a.kortingRegels[0]?.Gefactureerd_tm ? a.kortingRegels[0].Gefactureerd_tm.substring(0,10) : null;
              const regelsMet50 = a.regels.filter(r => isRegelActief(r) && parseFloat(r.Korting||0) === 50);
              const actieveHR = a.regels.filter(r => isRegelActief(r) && r.Itemcode !== 'KORT-TO-ABB');
              const alles50 = actieveHR.length > 0 && actieveHR.every(r => parseFloat(r.Korting||0) === 50);
              let acties = [];
              if (a.heeftKorting) acties.push('beeindigen');
              if (!alles50) acties.push('korting');
              const statusLabel = acties.length === 0 ? '✓ Gereed' :
                acties.includes('beeindigen') && acties.includes('korting') ? '⚠ Beide acties' :
                acties.includes('beeindigen') ? '✕ Beëindig KORT-TO-ABB' : '% Korting toepassen';
              const statusColor = acties.length === 0 ? 'var(--ts-success)' : acties.length === 2 ? 'var(--ts-danger)' : 'var(--ts-warning)';
              return `<tr>
                <td><span class="tag">${a.aboNr}</span></td>
                <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis" title="${a.naam}">${a.naam}</td>
                <td>${actieveHR.length} regel${actieveHR.length!==1?'s':''}</td>
                <td>${a.heeftKorting
                  ? `<span style="color:var(--ts-warning);font-size:12px">⚠ Aanwezig${kortingEind?' (gefact. t/m '+kortingEind+')':''}</span>`
                  : '<span style="color:var(--ts-success);font-size:12px">✓ Geen</span>'}</td>
                <td>${regelsMet50.length} / ${actieveHR.length}</td>
                <td><span style="font-size:12px;font-weight:600;color:${statusColor}">${statusLabel}</span></td>
                <td style="white-space:nowrap">
                  ${acties.length > 0 ? `<button class="save-row-btn" style="white-space:nowrap;background:var(--ts-accent)"
                    onclick="verwerkAbo(${a.aboNr})">⚡ Verwerk</button>` : ''}
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

async function syncKorting(aboNr) {
  const abo = kortingAnalyse.find(a => a.aboNr === aboNr);
  if (!abo) return;

  const kortingBedrag = -Math.round(abo.verwachteKorting * 100) / 100;
  const bestaandeRegel = abo.kortingRegels[0];

  const lineFields = {
    "VaIt": "2",
    "ItCd": "KORT-TO-ABB",
    "Pric": kortingBedrag,
    "Qu": 1
  };
  if (bestaandeRegel) lineFields["Id"] = parseInt(bestaandeRegel.Regelnummer);

  const body = {
    "FbSubscription": {
      "Element": {
        "Fields": { "SuNr": aboNr },
        "Objects": {
          "FbSubscriptionLines": {
            "Element": { "Fields": lineFields }
          }
        }
      }
    }
  };

  try {
    const r = await fetch(`${AFAS_BASE}/connectors/FbSubscription`, {
      method: bestaandeRegel ? 'PUT' : 'POST',
      headers: { 'Authorization': `AfasToken ${btoa(afasToken)}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (r.ok || r.status === 204 || r.status === 201) {
      abo.status = 'ok';
      renderKortingResultaat(document.getElementById('mainContent'));
      showToast(`Korting abo ${aboNr} gesynchroniseerd`, 'success');
    } else {
      const err = await r.text();
      showToast(`Fout abo ${aboNr}: ${err.substring(0,120)}`, 'error');
    }
  } catch(e) { showToast('Fout: ' + e.message, 'error'); }
}

async function verwerkAbo(aboNr) {
  const abo = kortingAnalyse.find(a => a.aboNr === aboNr);
  if (!abo) return;
  // Stap 1: beëindig KORT-TO-ABB als aanwezig
  if (abo.heeftKorting) await beeindigenKortingsregel(aboNr, true);
  // Stap 2: pas 50% toe op actieve regels
  await pasKortingToe(aboNr, true);
  renderKortingResultaat(document.getElementById('mainContent'));
  showToast(`Abo ${aboNr} verwerkt`, 'success');
}

async function beeindigenKortingsregel(aboNr, silent = false) {
  const abo = kortingAnalyse.find(a => a.aboNr === aboNr);
  if (!abo || !abo.kortingRegels[0]) return;

  let errors = 0;
  for (const regel of abo.kortingRegels) {
    let verwerkt = false;

    // Stap 1: probeer te verwijderen (DELETE) — lukt alleen als nog niet gefactureerd
    try {
      // AFAS DELETE: verwijder abonnementsregel via padstructuur
      const rDel = await fetch(`${AFAS_BASE}/connectors/FbSubscription/FbSubscription/@SuNr/${aboNr}/FbSubscriptionLines/@Id/${regel.Regelnummer}`, {
        method: 'DELETE',
        headers: { 'Authorization': `AfasToken ${btoa(afasToken)}`, 'Content-Type': 'application/json' }
      });
      if (rDel.ok || rDel.status === 204) {
        verwerkt = true;
      }
    } catch(e) { /* DELETE mislukt, probeer beëindigen */ }

    // Stap 2: als DELETE niet lukte, beëindig via einddatum
    if (!verwerkt) {
      const eindDatum = regel.Gefactureerd_tm
        ? regel.Gefactureerd_tm.substring(0,10)
        : new Date().toISOString().split('T')[0];

      const body = {
        "FbSubscription": {
          "Element": {
            "Fields": { "SuNr": aboNr },
            "Objects": {
              "FbSubscriptionLines": {
                "Element": {
                  "Fields": { "Id": parseInt(regel.Regelnummer), "DaEn": eindDatum, "VaRs": "04" }
                }
              }
            }
          }
        }
      };
      try {
        const rPut = await fetch(`${AFAS_BASE}/connectors/FbSubscription`, {
          method: 'PUT',
          headers: { 'Authorization': `AfasToken ${btoa(afasToken)}`, 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (rPut.ok || rPut.status === 204) {
          verwerkt = true;
        } else {
          errors++;
          if (!silent) {
            const err = await rPut.text();
            console.error(`Abo ${aboNr} regel ${regel.Regelnummer}:`, err);
          }
        }
      } catch(e) { errors++; }
    }
  }

  // Update lokale staat alleen als er geen fouten waren
  if (errors === 0) {
    abo.heeftKorting = false;
    abo.kortingRegels = [];
    // Update in alleRegels ook
    alleRegels = alleRegels.filter(r => !(r.Nummer_abonnement === aboNr && r.Itemcode === 'KORT-TO-ABB'));
  }

  if (!silent) {
    renderKortingResultaat(document.getElementById('mainContent'));
    if (errors === 0) {
      showToast(`KORT-TO-ABB abo ${aboNr} verwijderd/beëindigd`, 'success');
    } else {
      showToast(`Fout bij verwerken abo ${aboNr} — controleer de console`, 'error');
    }
  }
}

async function pasKortingToe(aboNr, silent = false) {
  const abo = kortingAnalyse.find(a => a.aboNr === aboNr);
  if (!abo) return;
  const actieveRegels = abo.regels.filter(r => isRegelActief(r) && r.Itemcode !== 'KORT-TO-ABB' && parseFloat(r.Korting||0) !== 50);
  if (actieveRegels.length === 0) { showToast('Alle regels hebben al 50% korting', 'success'); return; }

  let ok = 0; let errors = 0;
  for (const regel of actieveRegels) {
    const body = {
      "FbSubscription": {
        "Element": {
          "Fields": { "SuNr": aboNr },
          "Objects": {
            "FbSubscriptionLines": {
              "Element": {
                "Fields": { "Id": parseInt(regel.Regelnummer), "DcPr": 50, "IsPc": true }
              }
            }
          }
        }
      }
    };
    try {
      const r = await fetch(`${AFAS_BASE}/connectors/FbSubscription`, {
        method: 'PUT',
        headers: { 'Authorization': `AfasToken ${btoa(afasToken)}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (r.ok || r.status === 204) { ok++; regel.Korting = 50; }
      else { errors++; const err = await r.text(); showToast(`Fout regel ${regel.Regelnummer}: ${err.substring(0,100)}`, 'error'); }
    } catch(e) { errors++; }
  }
  if (ok > 0) {
    abo.alleRegelsMet50 = abo.regels.filter(r => isRegelActief(r) && r.Itemcode !== 'KORT-TO-ABB').every(r => parseFloat(r.Korting||0) === 50);
    if (!silent) {
      renderKortingResultaat(document.getElementById('mainContent'));
      showToast(`${ok} regel(s) abo ${aboNr} — 50% korting toegepast`, 'success');
    }
  }
}

async function syncAlleKortingen() {
  const toSync = kortingAnalyse.filter(a => a.status !== 'ok');
  let done = 0;
  for (const abo of toSync) {
    if (abo.status === 'beeindigen') await beeindigenKorting(abo.aboNr);
    else await syncKorting(abo.aboNr);
    done++;
  }
  showToast(`${done} kortingen gesynchroniseerd`, 'success');
}
