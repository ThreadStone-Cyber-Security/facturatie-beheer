<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Facturatie Mapping Beheer</title>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<style>
  :root {
    --ts-blue: #0e2a47;
    --ts-accent: #1e6fbd;
    --ts-light: #e8f0f9;
    --ts-border: #d0dce8;
    --ts-muted: #6b7f96;
    --ts-success: #1a7f4b;
    --ts-success-bg: #eafaf2;
    --ts-warning: #b45309;
    --ts-warning-bg: #fffbeb;
    --ts-danger: #b91c1c;
    --ts-danger-bg: #fef2f2;
    --ts-white: #ffffff;
    --ts-bg: #f4f7fb;
    --ts-card: #ffffff;
    --radius: 8px;
    --shadow: 0 1px 4px rgba(14,42,71,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--ts-bg); color: var(--ts-blue); font-size: 14px; }

  /* Layout */
  .shell { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; background: var(--ts-blue); flex-shrink: 0; display: flex; flex-direction: column; }
  .sidebar-logo { padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .sidebar-logo .brand { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: 0.02em; }
  .sidebar-logo .sub { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .nav { padding: 12px 0; flex: 1; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 20px; color: rgba(255,255,255,0.65); cursor: pointer; font-size: 13px; transition: background 0.15s, color 0.15s; }
  .nav-item:hover { background: rgba(255,255,255,0.07); color: #fff; }
  .nav-item.active { background: rgba(30,111,189,0.4); color: #fff; border-left: 3px solid #4da3ff; padding-left: 17px; }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .sidebar-user { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 12px; color: rgba(255,255,255,0.5); }
  .sidebar-user .uname { color: rgba(255,255,255,0.85); font-weight: 500; }

  .main { flex: 1; overflow: auto; }
  .topbar { background: var(--ts-white); border-bottom: 1px solid var(--ts-border); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; }
  .topbar h1 { font-size: 16px; font-weight: 600; color: var(--ts-blue); }
  .topbar .actions { display: flex; gap: 8px; }
  .content { padding: 24px 28px; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: var(--ts-accent); color: #fff; }
  .btn-primary:hover { background: #1560a8; }
  .btn-secondary { background: var(--ts-white); color: var(--ts-blue); border: 1px solid var(--ts-border); }
  .btn-secondary:hover { background: var(--ts-light); }
  .btn-danger { background: var(--ts-danger-bg); color: var(--ts-danger); border: 1px solid #fecaca; }
  .btn-danger:hover { background: #fee2e2; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Cards */
  .card { background: var(--ts-card); border: 1px solid var(--ts-border); border-radius: var(--radius); box-shadow: var(--shadow); }
  .card-header { padding: 14px 18px; border-bottom: 1px solid var(--ts-border); display: flex; align-items: center; justify-content: space-between; }
  .card-header h2 { font-size: 14px; font-weight: 600; }
  .card-body { padding: 18px; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
  .stat-card { background: var(--ts-card); border: 1px solid var(--ts-border); border-radius: var(--radius); padding: 16px 18px; }
  .stat-val { font-size: 26px; font-weight: 700; color: var(--ts-accent); line-height: 1; }
  .stat-lbl { font-size: 11px; color: var(--ts-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* Product grid */
  .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .product-tile { background: var(--ts-card); border: 1.5px solid var(--ts-border); border-radius: var(--radius); padding: 12px 14px; cursor: pointer; transition: all 0.15s; }
  .product-tile:hover { border-color: var(--ts-accent); box-shadow: 0 2px 8px rgba(30,111,189,0.12); }
  .product-tile.active { border-color: var(--ts-accent); background: var(--ts-light); }
  .product-tile .pname { font-weight: 600; font-size: 13px; }
  .product-tile .pmeta { font-size: 11px; color: var(--ts-muted); margin-top: 3px; }
  .badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; margin-top: 6px; letter-spacing: 0.03em; }
  .badge-auto { background: var(--ts-success-bg); color: var(--ts-success); }
  .badge-csv  { background: var(--ts-light); color: var(--ts-accent); }
  .badge-mail { background: var(--ts-warning-bg); color: var(--ts-warning); }

  /* Table */
  .tbl { width: 100%; border-collapse: collapse; }
  .tbl th { text-align: left; font-size: 11px; font-weight: 600; color: var(--ts-muted); text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 12px; border-bottom: 1px solid var(--ts-border); background: var(--ts-bg); }
  .tbl td { padding: 8px 12px; border-bottom: 1px solid var(--ts-border); vertical-align: middle; }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl tr:hover td { background: var(--ts-bg); }
  .tbl input { width: 100%; border: 1px solid var(--ts-border); border-radius: 5px; padding: 5px 8px; font-size: 13px; font-family: inherit; color: var(--ts-blue); background: var(--ts-white); }
  .tbl input:focus { outline: none; border-color: var(--ts-accent); }

  /* Login screen */
  .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--ts-blue); }
  .login-box { background: #fff; border-radius: 12px; padding: 40px; text-align: center; width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
  .login-box .logo { font-size: 20px; font-weight: 700; color: var(--ts-blue); margin-bottom: 6px; }
  .login-box .sub { font-size: 13px; color: var(--ts-muted); margin-bottom: 28px; }
  .login-box .btn { width: 100%; justify-content: center; padding: 11px; font-size: 14px; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--ts-blue); color: #fff; padding: 12px 18px; border-radius: var(--radius); font-size: 13px; box-shadow: 0 4px 16px rgba(0,0,0,0.2); z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--ts-success); }
  .toast.error { background: var(--ts-danger); }

  /* Loader */
  .loader { display: flex; align-items: center; gap: 10px; color: var(--ts-muted); font-size: 13px; padding: 24px 0; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--ts-border); border-top-color: var(--ts-accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state { text-align: center; padding: 32px; color: var(--ts-muted); font-size: 13px; }
  .section-title { font-size: 13px; font-weight: 600; color: var(--ts-blue); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .divider { border: none; border-top: 1px solid var(--ts-border); margin: 20px 0; }
  .tag { display: inline-flex; align-items: center; gap: 4px; background: var(--ts-light); color: var(--ts-accent); border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 500; }
  select.tbl-select { width: 100%; border: 1px solid var(--ts-border); border-radius: 5px; padding: 5px 8px; font-size: 13px; font-family: inherit; color: var(--ts-blue); background: var(--ts-white); }
  select.tbl-select:focus { outline: none; border-color: var(--ts-accent); }
  .sync-step { display: none; }
  .sync-step.active { display: block; }
  .step-indicator { display: flex; gap: 0; margin-bottom: 24px; }
  .step-dot { flex: 1; text-align: center; padding: 10px; font-size: 12px; font-weight: 600; color: var(--ts-muted); border-bottom: 3px solid var(--ts-border); }
  .step-dot.active { color: var(--ts-accent); border-color: var(--ts-accent); }
  .step-dot.done { color: var(--ts-success); border-color: var(--ts-success); }
  .upload-zone { border: 2px dashed var(--ts-border); border-radius: var(--radius); padding: 40px; text-align: center; cursor: pointer; transition: all 0.2s; }
  .upload-zone:hover { border-color: var(--ts-accent); background: var(--ts-light); }
  .upload-zone input { display: none; }
  .upload-zone .icon { font-size: 32px; margin-bottom: 8px; }
  .upload-zone p { color: var(--ts-muted); font-size: 13px; }
  .mapping-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  .mapping-table th { background: var(--ts-bg); padding: 8px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ts-muted); text-align: left; border-bottom: 1px solid var(--ts-border); }
  .mapping-table td { padding: 8px 12px; border-bottom: 1px solid var(--ts-border); font-size: 13px; vertical-align: middle; }
  .mapping-table select { width: 100%; border: 1px solid var(--ts-border); border-radius: 5px; padding: 5px 8px; font-size: 13px; background: var(--ts-white); color: var(--ts-blue); }
  .diff-new { background: var(--ts-success-bg); }
  .diff-changed { background: #fffbeb; }
  .diff-closed { background: var(--ts-danger-bg); }
  .diff-unchanged { background: var(--ts-white); }
  .diff-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
  .diff-badge.new { background: var(--ts-success-bg); color: var(--ts-success); }
  .diff-badge.changed { background: #fffbeb; color: var(--ts-warning); }
  .diff-badge.closed { background: var(--ts-danger-bg); color: var(--ts-danger); }
  .diff-badge.ok { background: var(--ts-light); color: var(--ts-muted); }
  .diff-badge.ignored { background: #f1f5f9; color: #94a3b8; }
  .diff-ignored td { opacity: 0.4; }
  .afas-token-input { width: 100%; border: 1px solid var(--ts-border); border-radius: 5px; padding: 8px 12px; font-size: 13px; font-family: monospace; color: var(--ts-blue); background: var(--ts-white); margin-bottom: 8px; }
  .progress-bar { height: 6px; background: var(--ts-border); border-radius: 3px; margin: 12px 0; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--ts-accent); border-radius: 3px; transition: width 0.3s; }
</style>
</head>
<body>

<!-- Login screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="logo">🔒 ThreadStone</div>
    <div class="sub">Facturatie Mapping Beheer<br>Log in met je Microsoft-account</div>
    <button class="btn btn-primary" id="loginBtn" onclick="signIn()" disabled>
      <svg viewBox="0 0 21 21" width="16" height="16" fill="currentColor"><path d="M0 0h10v10H0zm11 0h10v10H11zM0 11h10v10H0zm11 0h10v10H11z"/></svg>
      <span id="loginBtnText">Bezig met laden...</span>
    </button>
  </div>
</div>

<!-- App shell -->
<div class="shell" id="appShell" style="display:none">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="brand">ThreadStone</div>
      <div class="sub">Facturatie Beheer</div>
    </div>
    <nav class="nav">
      <div class="nav-item active" onclick="showTab('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </div>
      <div class="nav-item" onclick="showTab('mapping')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2v-4M9 21H5a2 2 0 01-2-2v-4m0 0h18"/></svg>
        Kolom mapping
      </div>
      <div class="nav-item" onclick="showTab('validatie')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Validatieregels
      </div>
      <div class="nav-item" onclick="showTab('producten')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
        Producten
      </div>
      <div class="nav-item" onclick="showTab('sync')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        AFAS Sync
      </div>
    </nav>
    <div class="sidebar-user">
      <div class="uname" id="sidebarUser">—</div>
      <div style="margin-top:4px; cursor:pointer; font-size:11px;" onclick="signOut()">Uitloggen</div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <h1 id="pageTitle">Dashboard</h1>
      <div class="actions" id="topActions"></div>
    </div>
    <div class="content" id="mainContent">
      <div class="loader"><div class="spinner"></div> Laden...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const CLIENT_ID  = 'da072118-d9bc-4a32-a2b9-099fc610643e';
const TENANT_ID  = '63acceb2-e69a-4ffc-8ab0-737752764237';
const SITE_URL   = 'https://threadstonecs.sharepoint.com/sites/team_finance';
const GRAPH      = 'https://graph.microsoft.com/v1.0';
const SCOPES     = ['https://graph.microsoft.com/Sites.ReadWrite.All'];

let siteId = null;
let token  = null;
let producten = [];
let activeProduct = null;

// ── MSAL ────────────────────────────────────────────────────────────────────
const msalApp = new msal.PublicClientApplication({
  auth: {
    clientId: CLIENT_ID,
    authority: `https://login.microsoftonline.com/${TENANT_ID}`,
    redirectUri: 'https://threadstone-cyber-security.github.io/facturatie-beheer/',
  },
  cache: { cacheLocation: 'sessionStorage' }
});

async function signIn() {
  try {
    const res = await msalApp.loginPopup({ scopes: SCOPES });
    await initApp(res.account);
  } catch(e) { showToast('Inloggen mislukt: ' + e.message, 'error'); }
}

function signOut() {
  msalApp.logoutPopup();
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appShell').style.display = 'none';
}

async function getToken() {
  const accounts = msalApp.getAllAccounts();
  if (!accounts.length) throw new Error('Niet ingelogd');
  const res = await msalApp.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
  return res.accessToken;
}

async function graph(method, path, body) {
  token = await getToken();
  const opts = {
    method,
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(GRAPH + path, opts);
  if (!r.ok) throw new Error(`Graph ${method} ${path} → ${r.status}: ${await r.text()}`);
  if (r.status === 204) return null;
  return r.json();
}

// ── Init ────────────────────────────────────────────────────────────────────
async function initApp(account) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'flex';
  document.getElementById('sidebarUser').textContent = account.name || account.username;

  try {
    const site = await graph('GET', `/sites/threadstonecs.sharepoint.com:/sites/team_finance`);
    siteId = site.id;
    await loadProducenten();
    showTab('dashboard');
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `<div class="empty-state">Fout bij laden: ${e.message}</div>`;
  }
}

async function loadProducenten() {
  const data = await graph('GET', `/sites/${siteId}/lists/Producten/items?$expand=fields&$top=100`);
  producten = (data.value || []).map(i => ({
    id: i.id,
    naam: i.fields.Title,
    brontype: i.fields.Brontype || '',
    bronlocatie: i.fields.Bronlocatie || '',
    afas: i.fields.AFASDoorbelasting || '',
    actief: i.fields.Actief !== false,
  }));
}

// ── Tab routing ──────────────────────────────────────────────────────────────
function showTab(tab) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.nav-item')[['dashboard','mapping','validatie','producten','sync'].indexOf(tab)]?.classList.add('active');
  const titles = { dashboard: 'Dashboard', mapping: 'Kolom mapping', validatie: 'Validatieregels', producten: 'Producten', sync: 'AFAS Sync' };
  document.getElementById('pageTitle').textContent = titles[tab];
  document.getElementById('topActions').innerHTML = '';
  if (tab === 'dashboard') renderDashboard();
  else if (tab === 'mapping') renderMapping();
  else if (tab === 'validatie') renderValidatie();
  else if (tab === 'producten') renderProducten();
  else if (tab === 'sync') renderSync();
}

// ── Dashboard ────────────────────────────────────────────────────────────────
async function renderDashboard() {
  const c = document.getElementById('mainContent');
  c.innerHTML = '<div class="loader"><div class="spinner"></div> Statistieken laden...</div>';
  try {
    const [mapData, valData] = await Promise.all([
      graph('GET', `/sites/${siteId}/lists/MappingRegels/items?$expand=fields&$top=500`),
      graph('GET', `/sites/${siteId}/lists/Validatieregels/items?$expand=fields&$top=100`),
    ]);
    const mappings = mapData.value || [];
    const csvProds = producten.filter(p => p.brontype === 'CSV / Excel');
    const metMapping = [...new Set(mappings.map(m => m.fields.Product))].length;
    const zonderMapping = csvProds.filter(p => !mappings.find(m => m.fields.Product === p.naam)).length;

    c.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-val">${producten.length}</div><div class="stat-lbl">Producten</div></div>
        <div class="stat-card"><div class="stat-val">${mappings.length}</div><div class="stat-lbl">Mapping regels</div></div>
        <div class="stat-card"><div class="stat-val">${metMapping}</div><div class="stat-lbl">Producten met mapping</div></div>
        <div class="stat-card"><div class="stat-val" style="color:${zonderMapping > 0 ? 'var(--ts-danger)' : 'var(--ts-success)'}">${zonderMapping}</div><div class="stat-lbl">Ontbrekende mappings</div></div>
      </div>
      <div class="card" style="margin-bottom:16px">
        <div class="card-header"><h2>Producten overzicht</h2></div>
        <div class="card-body" style="padding:0">
          <table class="tbl">
            <thead><tr><th>Product</th><th>Brontype</th><th>AFAS doorbelasting</th><th>Mapping regels</th><th>Status</th></tr></thead>
            <tbody>
              ${producten.map(p => {
                const count = mappings.filter(m => m.fields.Product === p.naam).length;
                const needsMapping = p.brontype === 'CSV / Excel';
                const ok = !needsMapping || count > 0;
                return `<tr>
                  <td><strong>${p.naam}</strong></td>
                  <td><span class="badge ${p.brontype === 'AFAS koppeling' ? 'badge-auto' : p.brontype === 'CSV / Excel' ? 'badge-csv' : 'badge-mail'}">${p.brontype || '—'}</span></td>
                  <td>${p.afas || '—'}</td>
                  <td>${needsMapping ? count + ' regel' + (count !== 1 ? 's' : '') : '<span style="color:var(--ts-muted)">n.v.t.</span>'}</td>
                  <td><span style="color:${ok ? 'var(--ts-success)' : 'var(--ts-danger)'}; font-size:12px; font-weight:600">${ok ? '✓ OK' : '⚠ Ontbreekt'}</span></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  } catch(e) { c.innerHTML = `<div class="empty-state">Fout: ${e.message}</div>`; }
}

// ── Mapping ──────────────────────────────────────────────────────────────────
async function renderMapping() {
  const c = document.getElementById('mainContent');
  c.innerHTML = '<div class="loader"><div class="spinner"></div> Mapping regels laden...</div>';

  if (!activeProduct) activeProduct = producten.find(p => p.brontype === 'CSV / Excel')?.naam || producten[0]?.naam;

  try {
    const mapData = await graph('GET', `/sites/${siteId}/lists/MappingRegels/items?$expand=fields&$top=500`);
    const allMappings = mapData.value || [];

    const productTiles = producten.map(p => {
      const count = allMappings.filter(m => m.fields.Product === p.naam).length;
      return `<div class="product-tile ${p.naam === activeProduct ? 'active' : ''}" onclick="selectProduct('${p.naam}')">
        <div class="pname">${p.naam}</div>
        <div class="pmeta">${count} regel${count !== 1 ? 's' : ''}</div>
        <span class="badge ${p.brontype === 'AFAS koppeling' ? 'badge-auto' : p.brontype === 'CSV / Excel' ? 'badge-csv' : 'badge-mail'}">${p.brontype || '—'}</span>
      </div>`;
    }).join('');

    const prod = producten.find(p => p.naam === activeProduct);
    const mappings = allMappings.filter(m => m.fields.Product === activeProduct);

    let editorHtml = '';
    if (prod?.brontype === 'AFAS koppeling') {
      editorHtml = `<div class="empty-state" style="color:var(--ts-success)">✓ Dit product heeft een directe AFAS-koppeling — geen kolom mapping nodig.</div>`;
    } else {
      editorHtml = `
        <div class="card-header">
          <h2>Mapping regels — ${activeProduct}</h2>
          <button class="btn btn-primary btn-sm" onclick="addMappingRegel()">+ Regel toevoegen</button>
        </div>
        <div class="card-body" style="padding:0">
          <table class="tbl">

// ── AFAS Sync ─────────────────────────────────────────────────────────────────
const AFAS_BASE = 'https://36333.rest.afas.online/ProfitRestServices';
let afasToken = '';
let syncStep = 1;
let excelRows = [];
let orgMappings = {};      // org naam → AFAS VerkoopRelID
let itemMappings = {};     // billing type → AFAS Itemcode
let afasRelaties = [];
let afasItems = [];
let afasRegels = [];
let diffResult = [];

function afasHeaders() {
  const b64 = btoa(afasToken);
  return { 'Authorization': `AfasToken ${b64}`, 'Content-Type': 'application/json' };
}

async function afasGet(connector, filters) {
  let url = `${AFAS_BASE}/connectors/${connector}?skip=0&take=1000`;
  if (filters) url += `&filterfieldids=${filters.field}&filtervalues=${filters.value}&operatortypes=1`;
  const r = await fetch(url, { headers: afasHeaders() });
  if (!r.ok) throw new Error(`AFAS ${connector}: ${r.status}`);
  const d = await r.json();
  return d.rows || [];
}

function renderSync() {
  const c = document.getElementById('mainContent');
  c.innerHTML = `
    <div class="step-indicator">
      <div class="step-dot ${syncStep >= 1 ? (syncStep > 1 ? 'done' : 'active') : ''}" id="step1dot">1. Bestand & token</div>
      <div class="step-dot ${syncStep >= 2 ? (syncStep > 2 ? 'done' : 'active') : ''}" id="step2dot">2. Koppelen</div>
      <div class="step-dot ${syncStep >= 3 ? (syncStep > 3 ? 'done' : 'active') : ''}" id="step3dot">3. Preview</div>
      <div class="step-dot ${syncStep >= 4 ? 'active' : ''}" id="step4dot">4. Sync</div>
    </div>
    <div id="sync-content"></div>`;
  renderSyncStep();
}

function renderSyncStep() {
  const c = document.getElementById('sync-content');
  if (syncStep === 1) renderStep1(c);
  else if (syncStep === 2) renderStep2(c);
  else if (syncStep === 3) renderStep3(c);
  else if (syncStep === 4) renderStep4(c);
}

async function handleFileUpload(input) {
  const file = input.files[0];
  if (!file) return;
  afasToken = document.getElementById('afasTokenInput').value;

  // Parse CSV or Excel
  if (file.name.endsWith('.csv')) {
    const text = await file.text();
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim().replace(/"/g,''));
    excelRows = lines.slice(1).map(line => {
      const cols = line.split(',').map(c => c.trim().replace(/"/g,''));
      const row = {};
      headers.forEach((h,i) => row[h] = cols[i]);
      return {
        org: row['Organization'] || row['organization'] || '',
        billingType: row['Billing Type'] || row['billing_type'] || row['BillingType'] || '',
        seats: parseFloat(row['Seats'] || row['seats'] || 0),
        endDate: row['End Date'] || row['end_date'] || row['EndDate'] || '',
        raw: row
      };
    }).filter(r => r.org);
  } else {
    // Excel via SheetJS
    const buf = await file.arrayBuffer();
    const XLSX = await import('https://cdn.sheetjs.com/xlsx-0.20.1/package/xlsx.mjs');
    const wb = XLSX.read(buf);
    const ws = wb.Sheets[wb.SheetNames[0]];
    const data = XLSX.utils.sheet_to_json(ws);
    excelRows = data.map(row => ({
      org: row['Customer'] || row['Organization'] || '',
      billingType: row['Product'] || row['Billing Type'] || '',
      seats: parseFloat(row['Quantity'] || row['Seats'] || 0),
      startDate: row['Start date'] || row['Start Date'] || '',
      endDate: row['End date'] || row['End Date'] || '',
      discount: parseFloat(row['Discount %'] || row['Discount'] || 0) || 0,
      lineId: row['Subscription Line ID'] || row['Regelnummer'] || '',
      raw: row
    })).filter(r => r.org && r.billingType && r.seats > 0);
  }
  renderSyncStep();
}

async function goStep2() {
  afasToken = document.getElementById('afasTokenInput').value;
  if (!afasToken) { showToast('Vul eerst het AFAS token in', 'error'); return; }

  const c = document.getElementById('sync-content');
  c.innerHTML = '<div class="loader"><div class="spinner"></div> AFAS data ophalen...</div>';

  try {
    [afasRelaties, afasItems] = await Promise.all([
      afasGet('PowerP_Verkooprelaties'),
      afasGet('PowerP_Items'),
    ]);

    // Load saved org mappings from SharePoint
    try {
      const spData = await graph('GET', `/sites/${siteId}/lists/OrgMappings/items?$expand=fields&$top=500`);
      (spData.value || []).forEach(i => { orgMappings[i.fields.Title] = i.fields.AFASVerkoopRelID; });
    } catch(e) { /* lijst bestaat nog niet */ }

    // Load saved item mappings from MappingRegels
    try {
      const mapData = await graph('GET', `/sites/${siteId}/lists/MappingRegels/items?$expand=fields&$top=500`);
      (mapData.value || []).filter(i => i.fields.Product === 'Knowbe4').forEach(i => {
        itemMappings[i.fields.CSVWaarde] = i.fields.AFASAbonnementID;
      });
    } catch(e) {}

    syncStep = 2;
    renderSyncStep();
  } catch(e) { showToast('AFAS fout: ' + e.message, 'error'); renderSyncStep(); }
}

let ignoredRows = new Set(); // set of "org|billingType" keys

function toggleIgnore(key, btn) {
  if (ignoredRows.has(key)) {
    ignoredRows.delete(key);
    btn.textContent = 'Negeer';
    btn.classList.remove('btn-secondary');
    btn.classList.add('btn-danger');
    const row = btn.closest('tr');
    row.classList.remove('diff-ignored');
    // restore original status badge
    const badge = row.querySelector('.diff-badge');
    if (badge) badge.style.display = '';
  } else {
    ignoredRows.add(key);
    btn.textContent = 'Herstellen';
    btn.classList.remove('btn-danger');
    btn.classList.add('btn-secondary');
    const row = btn.closest('tr');
    row.classList.add('diff-ignored');
    const badge = row.querySelector('.diff-badge');
    if (badge) badge.style.display = 'none';
    row.querySelector('.ignore-badge').style.display = '';
  }
  // update sync button count
  const toSync = diffResult.filter(r => (r.status === 'new' || r.status === 'changed') && !ignoredRows.has(r.org + '|' + r.billingType));
  const syncBtn = document.getElementById('syncPreviewBtn');
  if (syncBtn) syncBtn.textContent = `Sync uitvoeren (${toSync.length} wijzigingen) →`;
  if (syncBtn) syncBtn.disabled = toSync.length === 0;
}

function filterItemDropdown(input, selectId) {
  const q = input.value.toLowerCase();
  const sel = document.getElementById(selectId);
  if (!sel) return;
  Array.from(sel.options).forEach(opt => {
    opt.style.display = !q || opt.text.toLowerCase().includes(q) || opt.value.toLowerCase().includes(q) ? '' : 'none';
  });
}

async function saveMappingsAndPreview() {
  const c = document.getElementById('sync-content');

  // Collect org mappings
  const uniqueOrgs = [...new Set(excelRows.map(r => r.org))];
  uniqueOrgs.forEach(org => {
    const key = btoa(org).replace(/=/g,'');
    const sel = document.getElementById(`orgmap_${key}`);
    if (sel?.value) orgMappings[org] = sel.value;
  });

  // Collect item mappings
  const uniqueTypes = [...new Set(excelRows.map(r => r.billingType))];
  uniqueTypes.forEach(type => {
    const key = btoa(type).replace(/=/g,'');
    const sel = document.getElementById(`typemap_${key}`);
    if (sel?.value) itemMappings[type] = sel.value;
  });

  c.innerHTML = '<div class="loader"><div class="spinner"></div> Mappings opslaan & AFAS vergelijken...</div>';

  // Save org mappings to SharePoint OrgMappings list
  try {
    for (const [org, relId] of Object.entries(orgMappings)) {
      await graph('POST', `/sites/${siteId}/lists/OrgMappings/items`, {
        fields: { Title: org, AFASVerkoopRelID: relId, Product: 'Knowbe4' }
      }).catch(() => {}); // ignore duplicates
    }
  } catch(e) {}

  // Save item mappings to MappingRegels
  try {
    for (const [type, itemcode] of Object.entries(itemMappings)) {
      await graph('POST', `/sites/${siteId}/lists/MappingRegels/items`, {
        fields: { Title: `Knowbe4 - ${type}`, Product: 'Knowbe4', CSVWaarde: type, AFASAbonnementID: itemcode }
      }).catch(() => {});
    }
  } catch(e) {}

  // Fetch current AFAS abonnementregels for mapped relaties
  try {
    const relIds = Object.values(orgMappings);
    afasRegels = await afasGet('PowerP_Abonnementregels');
    afasRegels = afasRegels.filter(r => relIds.includes(r.OrganisatieId));
  } catch(e) { showToast('AFAS fout bij ophalen regels: ' + e.message, 'error'); return; }

  // Build diff
  diffResult = [];
  for (const row of excelRows) {
    const relId = orgMappings[row.org];
    const itemcode = itemMappings[row.billingType];
    if (!relId || !itemcode) {
      diffResult.push({ ...row, status: 'no_mapping', afasRegel: null });
      continue;
    }
    // Match on lineId directly if provided, otherwise match on relId + itemcode
    let existing;
    if (row.lineId) {
      existing = afasRegels.find(r => String(r.Regelnummer) === String(row.lineId));
    } else {
      existing = afasRegels.find(r => r.OrganisatieId === relId && r.Itemcode === itemcode);
    }
    if (!existing) {
      diffResult.push({ ...row, relId, itemcode, status: 'new', afasRegel: null });
    } else if (Math.abs(existing.Aantal - row.seats) > 0.01 || (row.endDate && row.endDate !== '') || (row.discount && Math.abs((existing.Korting||0) - row.discount) > 0.01)) {
      diffResult.push({ ...row, relId, itemcode, status: 'changed', afasRegel: existing, oldSeats: existing.Aantal });
    } else {
      diffResult.push({ ...row, relId, itemcode, status: 'ok', afasRegel: existing });
    }
  }

  syncStep = 3;
  renderSyncStep();
}

function renderStep3(c) {
  const counts = { new: 0, changed: 0, closed: 0, ok: 0, no_mapping: 0 };
  diffResult.forEach(r => counts[r.status]++);

  c.innerHTML = `
    <div class="stats-grid" style="margin-bottom:16px">
      <div class="stat-card"><div class="stat-val" style="color:var(--ts-success)">${counts.new}</div><div class="stat-lbl">Nieuw</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--ts-warning)">${counts.changed}</div><div class="stat-lbl">Gewijzigd</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--ts-muted)">${counts.ok}</div><div class="stat-lbl">Ongewijzigd</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--ts-danger)">${counts.no_mapping}</div><div class="stat-lbl">Geen mapping</div></div>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div class="card-header"><h2>Sync preview</h2></div>
      <div class="card-body" style="padding:0">
        <table class="tbl">
          <thead><tr><th>Customer</th><th>Product</th><th>Line ID</th><th>Quantity huidig</th><th>Quantity nieuw</th><th>Einddatum</th><th>Korting %</th><th>Status</th><th></th></tr></thead>
          <tbody>
            ${diffResult.map(r => `
            <tr class="diff-${r.status}">
              <td>${r.org}</td>
              <td>${r.billingType}</td>
              <td>${r.lineId ? `<span class="tag">${r.lineId}</span>` : (r.afasRegel ? `<span class="tag" style="background:var(--ts-success-bg);color:var(--ts-success)">${r.afasRegel.Regelnummer}</span>` : '—')}</td>
              <td>${r.afasRegel ? r.afasRegel.Aantal : '—'}</td>
              <td>${r.seats}</td>
              <td>${r.endDate || '—'}</td>
              <td>${r.discount ? r.discount + '%' : '—'}</td>
              <td>
                <span class="diff-badge ${r.status}" style="${ignoredRows.has(r.org+'|'+r.billingType) ? 'display:none' : ''}">${
                  r.status === 'new' ? '+ Nieuw' :
                  r.status === 'changed' ? '~ Gewijzigd' :
                  r.status === 'ok' ? '✓ OK' :
                  r.status === 'no_mapping' ? '⚠ Geen mapping' : r.status
                }</span>
                <span class="diff-badge ignored ignore-badge" style="${ignoredRows.has(r.org+'|'+r.billingType) ? '' : 'display:none'}">Genegeerd</span>
              </td>
              <td>${r.status !== 'ok' && r.status !== 'no_mapping' ? `
                <button class="btn btn-sm ${ignoredRows.has(r.org+'|'+r.billingType) ? 'btn-secondary' : 'btn-danger'}"
                  onclick="toggleIgnore('${r.org}|${r.billingType}', this)">
                  ${ignoredRows.has(r.org+'|'+r.billingType) ? 'Herstellen' : 'Negeer'}
                </button>` : ''}
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
    <div style="margin-top:16px;display:flex;justify-content:space-between">
      <button class="btn btn-secondary" onclick="syncStep=2;renderSyncStep()">← Terug</button>
      <button class="btn btn-primary" id="syncPreviewBtn" onclick="syncStep=4;renderSyncStep()" ${counts.new+counts.changed===0?'disabled':''}>
        Sync uitvoeren (${counts.new+counts.changed - ignoredRows.size} wijzigingen) →
      </button>
    </div>`;
}

function renderStep4(c) {
  const toSync = diffResult.filter(r => (r.status === 'new' || r.status === 'changed') && !ignoredRows.has(r.org + '|' + r.billingType));
  c.innerHTML = `
    <div class="card">
      <div class="card-header"><h2>Sync uitvoeren</h2></div>
      <div class="card-body">
        <p style="font-size:13px;margin-bottom:16px">${toSync.length} wijzigingen worden naar AFAS geschreven.</p>
        <div class="progress-bar"><div class="progress-fill" id="syncProgress" style="width:0%"></div></div>
        <div id="syncLog" style="font-size:12px;font-family:monospace;background:var(--ts-bg);border-radius:var(--radius);padding:12px;max-height:300px;overflow-y:auto;margin-top:12px"></div>
        <div style="margin-top:16px;display:flex;justify-content:space-between">
          <button class="btn btn-secondary" onclick="syncStep=3;renderSyncStep()">← Terug</button>
          <button class="btn btn-primary" id="startSyncBtn" onclick="startSync()">▶ Start sync</button>
        </div>
      </div>
    </div>`;
}

async function startSync() {
  document.getElementById('startSyncBtn').disabled = true;
  const toSync = diffResult.filter(r => (r.status === 'new' || r.status === 'changed') && !ignoredRows.has(r.org + '|' + r.billingType));
  const log = document.getElementById('syncLog');
  const bar = document.getElementById('syncProgress');
  let done = 0;

  for (const row of toSync) {
    try {
      if (row.status === 'changed') {
        // Update bestaande regel via UpdateConnector
        const fields = { "QuUn": row.seats };
        if (row.endDate) {
          fields["EdDt"] = new Date(row.endDate).toISOString().split('T')[0];
          fields["RsEn"] = "03";
        }
        if (row.discount) fields["Disc"] = row.discount;
        const body = {
          "KnFbSubscriptionLines": {
            "Element": {
              "@AbNr": row.afasRegel.Nummer_abonnement,
              "@RgNr": row.afasRegel.Regelnummer,
              "Fields": fields
            }
          }
        };
        const r = await fetch(`${AFAS_BASE}/connectors/KnFbSubscriptionLines`, {
          method: 'PUT',
          headers: afasHeaders(),
          body: JSON.stringify(body)
        });
        if (r.ok) {
          log.innerHTML += `<div style="color:var(--ts-success)">✓ ${row.org} — Seats bijgewerkt: ${row.oldSeats} → ${row.seats}</div>`;
        } else {
          const err = await r.text();
          log.innerHTML += `<div style="color:var(--ts-danger)">✗ ${row.org} — Fout: ${err.substring(0,100)}</div>`;
        }
      } else if (row.status === 'new') {
        log.innerHTML += `<div style="color:var(--ts-warning)">⚠ ${row.org} — Nieuw abonnement aanmaken vereist handmatige actie in AFAS (nog niet geautomatiseerd)</div>`;
      }
    } catch(e) {
      log.innerHTML += `<div style="color:var(--ts-danger)">✗ ${row.org} — ${e.message}</div>`;
    }
    done++;
    bar.style.width = `${Math.round(done/toSync.length*100)}%`;
    log.scrollTop = log.scrollHeight;
  }
  log.innerHTML += `<div style="margin-top:8px;font-weight:600;color:var(--ts-blue)">── Sync voltooid ──</div>`;
  showToast('Sync klaar!', 'success');
}

// ── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => t.className = 'toast', 3000);
}

// ── Auto-login check ─────────────────────────────────────────────────────────
async function initMsal() {
  try {
    await msalApp.initialize();
    const btn = document.getElementById('loginBtn');
    const btnText = document.getElementById('loginBtnText');
    if (btn) { btn.disabled = false; btnText.textContent = 'Inloggen met Microsoft'; }
    const accounts = msalApp.getAllAccounts();
    if (accounts.length) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appShell').style.display = 'flex';
      document.getElementById('sidebarUser').textContent = accounts[0].name || accounts[0].username;
      try {
        const site = await graph('GET', `/sites/threadstonecs.sharepoint.com:/sites/team_finance`);
        siteId = site.id;
        await loadProducenten();
        showTab('dashboard');
      } catch(e) {
        document.getElementById('mainContent').innerHTML = `<div class="empty-state">Fout bij laden: ${e.message}</div>`;
      }
    }
  } catch(e) {
    const btnText = document.getElementById('loginBtnText');
    if (btnText) btnText.textContent = 'Fout: herlaad de pagina';
    console.error('MSAL init fout:', e);
  }
}

window.addEventListener('load', initMsal);
</script>
</body>
</html>
