    // Load abonnementen
    const aboRaw = await afasGet('PowerP_Abonnementen');

    // Use cached regels or load them
    if (alleRegels.length === 0) {
      c.innerHTML = '<div class="loader"><div class="spinner"></div> Abonnementsregels laden...</div>';
      alleRegels = await afasGet('PowerP_Abonnementregels');
    }

    // Group regels per abonnement
    const regelPerAbo = {};
    alleRegels.forEach(r => {
      const nr = r.Nummer_abonnement;
      if (!regelPerAbo[nr]) regelPerAbo[nr] = [];
      regelPerAbo[nr].push(r);
    });

    // Build aboData
    aboData = aboRaw.map(a => {
      const regels = regelPerAbo[a.AbonnementsNr] || [];
      const actief = regels.filter(r => isRegelActief(r) && r.Itemcode !== 'KORT-TO-ABB');
      const inactief = regels.filter(r => !isRegelActief(r) && r.Itemcode !== 'KORT-TO-ABB');
      const kortingRegels = regels.filter(r => r.Itemcode === 'KORT-TO-ABB');
      const totaalWaarde = regels.filter(r => r.Itemcode !== 'KORT-TO-ABB').reduce((s,r) => s+(parseFloat(r.Waarde_abonnement)||0),0);
      const totaalKorting = kortingRegels.reduce((s,r) => s+(parseFloat(r.Waarde_abonnement)||0),0);
      return {
        ...a,
        actieveRegels: actief.length,
        inactieveRegels: inactief.length,
        totaalWaarde,
        totaalKorting,
        kortingRegels
      };
    });

    aboGefilterd = [...aboData];
    renderAboTable(c);
    showToast(`${aboData.length} abonnementen geladen`, 'success');
  } catch(e) { c.innerHTML = `<div class="empty-state">Fout: ${e.message}</div>`; }
}

function renderAboTable(c) {
  applyAboFilters();
  const uniqueTypes = [...new Set(aboData.map(a => a.Type_abonnement).filter(Boolean))].sort();
  const uniqueCyclus = [...new Set(aboData.map(a => a.Cyclus_facturering).filter(Boolean))].sort();

  c.innerHTML = `
    <div class="filter-bar">
      <input placeholder="🔍 Klant" value="${aboFilters.klant}" oninput="aboFilters.klant=this.value;applyAboFilters();updateAboTbody()" style="flex:1;min-width:140px" />
      <input placeholder="Abo nr" value="${aboFilters.aboNr}" oninput="aboFilters.aboNr=this.value;applyAboFilters();updateAboTbody()" style="width:100px" />
      <select onchange="aboFilters.type=this.value;applyAboFilters();updateAboTbody()">
        <option value="">Alle types</option>
        ${uniqueTypes.map(t => `<option value="${t}" ${aboFilters.type===t?'selected':''}>${t}</option>`).join('')}
      </select>
      <select onchange="aboFilters.cyclus=this.value;applyAboFilters();updateAboTbody()">
        <option value="">Alle cycli</option>
        ${uniqueCyclus.map(t => `<option value="${t}" ${aboFilters.cyclus===t?'selected':''}>${t}</option>`).join('')}
      </select>
      <span class="regels-count">${aboGefilterd.length} / ${aboData.length} abonnementen</span>
    </div>
    <div class="tbl-wrapper">
      <table class="regels-tbl">
        <thead>
          <tr>
            ${['AbonnementsNr','Type_abonnement','VerkoopRel_naam','Cyclus_facturering','Begindatum_abonnement','Begindatum_factuurcyclus','actieveRegels','totaalWaarde','totaalKorting'].map(f => `
            <th onclick="sortAbo('${f}')" class="${aboSortField===f?'sorted':''}">
              ${f==='AbonnementsNr'?'Abo nr':
                f==='Type_abonnement'?'Type':
                f==='VerkoopRel_naam'?'Klant':
                f==='Cyclus_facturering'?'Factuurcyclus':
                f==='Begindatum_abonnement'?'Startdatum':
                f==='Begindatum_factuurcyclus'?'Volgende factuurdatum':
                f==='actieveRegels'?'Actief / inactief':
                f==='totaalWaarde'?'Totale regelwaarde':
                f==='totaalKorting'?'Totaal korting':f}
              <span class="sort-icon">${aboSortField===f?(aboSortDir===1?'↑':'↓'):'↕'}</span>
            </th>`).join('')}
            <th></th>
          </tr>
        </thead>
        <tbody id="aboTbody">
          ${renderAboRows()}
        </tbody>
      </table>
    </div>`;
}

function applyAboFilters() {
  aboGefilterd = aboData.filter(a => {
    if (aboFilters.klant && !a.VerkoopRel_naam?.toLowerCase().includes(aboFilters.klant.toLowerCase())) return false;
    if (aboFilters.aboNr && String(a.AbonnementsNr) !== aboFilters.aboNr) return false;
    if (aboFilters.type && a.Type_abonnement !== aboFilters.type) return false;
    if (aboFilters.cyclus && a.Cyclus_facturering !== aboFilters.cyclus) return false;
    return true;
  });
  aboGefilterd.sort((a, b) => {
    const av = a[aboSortField] ?? '';
    const bv = b[aboSortField] ?? '';
    if (typeof av === 'number') return (av - bv) * aboSortDir;
    return String(av).localeCompare(String(bv)) * aboSortDir;
  });
}

function sortAbo(field) {
  if (aboSortField === field) aboSortDir *= -1;
  else { aboSortField = field; aboSortDir = 1; }
  applyAboFilters();
  document.getElementById('aboTbody').innerHTML = renderAboRows();
  document.querySelectorAll('.regels-tbl th').forEach((th, i) => {
    const fields = ['AbonnementsNr','Type_abonnement','VerkoopRel_naam','Cyclus_facturering','Begindatum_abonnement','Begindatum_factuurcyclus','actieveRegels','totaalWaarde','totaalKorting'];
    const f = fields[i];
    if (!f) return;
    th.className = aboSortField === f ? 'sorted' : '';
    const icon = th.querySelector('.sort-icon');
    if (icon) icon.textContent = aboSortField===f?(aboSortDir===1?'↑':'↓'):'↕';
  });
}

function updateAboTbody() {
  document.getElementById('aboTbody').innerHTML = renderAboRows();
}

function renderAboRows() {
  if (aboGefilterd.length === 0) return `<tr><td colspan="10" class="empty-state">Geen abonnementen gevonden</td></tr>`;
  const fmtDate = d => d ? d.substring(0,10) : '—';
  const fmtEur = v => v !== 0 ? (v < 0 ? '-€'+Math.abs(v).toFixed(2) : '€'+v.toFixed(2)) : '—';

  return aboGefilterd.slice(0,500).map(a => `
    <tr>
      <td><span class="tag" style="cursor:pointer" onclick="filterRegelsOpAbo(${a.AbonnementsNr})">${a.AbonnementsNr}</span></td>
      <td><span class="badge badge-csv" style="font-size:10px">${a.Type_abonnement||'—'}</span></td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis" title="${a.VerkoopRel_naam||''}">${a.VerkoopRel_naam||'—'}</td>
      <td style="font-size:12px">${a.Cyclus_facturering||'—'}</td>
      <td style="font-size:11px">${fmtDate(a.Begindatum_abonnement)}</td>
      <td style="font-size:11px">${fmtDate(a.Begindatum_factuurcyclus)}</td>
      <td>
        <span style="color:var(--ts-success);font-weight:500">${a.actieveRegels}</span>
        <span style="color:var(--ts-muted);font-size:11px"> / ${a.inactieveRegels} inactief</span>
      </td>
      <td style="font-weight:500">${fmtEur(a.totaalWaarde)}</td>
      <td style="color:${a.totaalKorting<0?'var(--ts-success)':'var(--ts-muted)'}">${fmtEur(a.totaalKorting)}</td>
      <td><button class="edit-btn" onclick="filterRegelsOpAbo(${a.AbonnementsNr})" title="Bekijk regels">→ Regels</button></td>
    </tr>`).join('');
}

function filterRegelsOpAbo(aboNr) {
  // Switch to regels tab and filter on this abo number
  regelFilters.abonNr = String(aboNr);
  regelFilters.klant = '';
  regelFilters.product = '';
  regelFilters.type = '';
  regelFilters.regelNr = '';
  regelFilters.omschrijving = '';
  regelFilters.status = 'alle';
  showTab('regels');
}

// ── Korting Techone bulk acties ──────────────────────────────────────────────
async function verwerkAlles() {
  const teVerwerken = kortingAnalyse.filter(a => a.heeftKorting || !a.alleRegelsMet50);
  if (!teVerwerken.length) { showToast('Niets te verwerken', 'success'); return; }
  if (!confirm(`${teVerwerken.length} abonnement(en) verwerken? (KORT-TO-ABB beëindigen + 50% toepassen)`)) return;

  const btn = document.getElementById('verwerkAllesBtn');
  if (btn) btn.disabled = true;

  const c = document.getElementById('mainContent');
  const prog = document.createElement('div');
  prog.style.cssText = 'padding:8px 0';
  prog.innerHTML = `<div class="progress-bar"><div class="progress-fill" id="verwerkProg" style="width:0%"></div></div>
    <div style="font-size:12px;color:var(--ts-muted);text-align:center;margin-top:4px" id="verwerkTxt">0 / ${teVerwerken.length}</div>`;
  c.prepend(prog);

  let done = 0;
  for (const abo of teVerwerken) {
    if (abo.heeftKorting) await beeindigenKortingsregel(abo.aboNr, true);
    await pasKortingToe(abo.aboNr, true);
    done++;
    const p = document.getElementById('verwerkProg');
    const t = document.getElementById('verwerkTxt');
    if (p) p.style.width = `${Math.round(done/teVerwerken.length*100)}%`;
    if (t) t.textContent = `${done} / ${teVerwerken.length}`;
  }

  prog.remove();
  if (btn) btn.disabled = false;
  renderKortingResultaat(c);
  showToast(`${done} abonnement(en) verwerkt`, 'success');
}


async function bulkBeeindigenAlleKort() {
  const metKort = kortingAnalyse.filter(a => a.heeftKorting);
  if (!metKort.length) { showToast('Geen KORT-TO-ABB regels gevonden', 'error'); return; }
  if (!confirm(`KORT-TO-ABB beëindigen voor ${metKort.length} abonnement(en)? Einddatum = gefactureerd t/m datum van de kortingsregel.`)) return;

  const c = document.getElementById('mainContent');
  const progressDiv = document.createElement('div');
  progressDiv.innerHTML = '<div class="loader"><div class="spinner"></div> Bezig met beëindigen...</div>';
  c.prepend(progressDiv);

  let ok = 0; let errors = 0;
  for (const abo of metKort) {
    for (const regel of abo.kortingRegels) {
      const eindDatum = regel.Gefactureerd_tm
        ? regel.Gefactureerd_tm.substring(0,10)
        : new Date().toISOString().split('T')[0];
      const body = {
        "FbSubscription": {
          "Element": {
            "Fields": { "SuNr": abo.aboNr },
            "Objects": { "FbSubscriptionLines": { "Element": { "Fields": {
              "Id": parseInt(regel.Regelnummer), "DaEn": eindDatum, "VaRs": "04"
            }}}}
          }
        }
      };
      try {
        const r = await fetch(`${AFAS_BASE}/connectors/FbSubscription`, {
          method: 'PUT',
          headers: { 'Authorization': `AfasToken ${btoa(afasToken)}`, 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (r.ok || r.status === 204) { ok++; }
        else { errors++; const err = await r.text(); console.error(`Abo ${abo.aboNr}:`, err); }
      } catch(e) { errors++; }
    }
    // Update local state
    abo.heeftKorting = false;
    abo.kortingRegels = [];
  }
  progressDiv.remove();
  renderKortingResultaat(c);
  showToast(`${ok} KORT-TO-ABB regel(s) beëindigd${errors>0?' ('+errors+' fouten)':''}`, ok>0?'success':'error');
}

async function bulkKortingAlleAbos() {
  const zonderKort = kortingAnalyse.filter(a => !a.alleRegelsMet50 && a.actief);
  if (!zonderKort.length) { showToast('Alle abonnementen hebben al 50% korting', 'success'); return; }

  const totaalRegels = zonderKort.reduce((s,a) => s + a.regels.filter(r => isRegelActief(r) && r.Itemcode !== 'KORT-TO-ABB' && parseFloat(r.Korting||0) !== 50).length, 0);
  if (!confirm(`50% kortingspercentage toepassen op ${totaalRegels} regel(s) in ${zonderKort.length} abonnement(en)?`)) return;

  const c = document.getElementById('mainContent');
  const progressDiv = document.createElement('div');
  progressDiv.style.cssText = 'padding:12px 0';
  progressDiv.innerHTML = `<div class="progress-bar"><div class="progress-fill" id="kortingProgress" style="width:0%"></div></div><div style="font-size:12px;color:var(--ts-muted);text-align:center" id="kortingProgressTxt">0 / ${totaalRegels} regels</div>`;
  c.prepend(progressDiv);

  let ok = 0; let errors = 0; let done = 0;
  for (const abo of zonderKort) {
    const teVerwerken = abo.regels.filter(r => isRegelActief(r) && r.Itemcode !== 'KORT-TO-ABB' && parseFloat(r.Korting||0) !== 50);
    for (const regel of teVerwerken) {
      const body = {
        "FbSubscription": {
          "Element": {
            "Fields": { "SuNr": abo.aboNr },
            "Objects": { "FbSubscriptionLines": { "Element": { "Fields": {
              "Id": parseInt(regel.Regelnummer), "DcPr": 50, "IsPc": true
            }}}}
          }
        }
      };
      try {
        const r = await fetch(`${AFAS_BASE}/connectors/FbSubscription`, {
          method: 'PUT',
          headers: { 'Authorization': `AfasToken ${btoa(afasToken)}`, 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (r.ok || r.status === 204) { ok++; regel.Korting = 50; }
        else { errors++; const err = await r.text(); console.error(`Regel ${regel.Regelnummer}:`, err); }
      } catch(e) { errors++; }
      done++;
      document.getElementById('kortingProgress').style.width = `${Math.round(done/totaalRegels*100)}%`;
      document.getElementById('kortingProgressTxt').textContent = `${done} / ${totaalRegels} regels`;
    }
    // Recheck alleRegelsMet50
    const actieveHR = abo.regels.filter(r => isRegelActief(r) && r.Itemcode !== 'KORT-TO-ABB');
    abo.alleRegelsMet50 = actieveHR.length > 0 && actieveHR.every(r => parseFloat(r.Korting||0) === 50);
  }
  progressDiv.remove();
  renderKortingResultaat(c);
  showToast(`50% korting toegepast op ${ok} regel(s)${errors>0?' ('+errors+' fouten)':''}`, ok>0?'success':'error');
}

let vcrData = [];
let vcrView = 'abonnement'; // 'abonnement' or 'eenmalig'
let vcrFilters = { klant: '', vc: '', status: 'klaar', itemcode: '', projectStatus: '' };
let vcrSortField = 'VC_Nummer';
let vcrSortDir = 1;
let afasTokenVcr = '';

async function renderVoorcalculaties() {
  const c = document.getElementById('mainContent');
  document.getElementById('topActions').innerHTML = `
    <input type="password" id="afasTokenVcrInput" placeholder="AFAS token" value="${afasTokenVcr||afasTokenRegels||afasToken}"

      oninput="afasTokenVcr=this.value;afasToken=this.value" />

  if (vcrData.length === 0) {
    c.innerHTML = `<div class="empty-state">Vul het AFAS token in en klik op Laden.</div>`;
    return;
  }
  renderVcrTable(c);
}

async function laadVoorcalculaties() {
  afasTokenVcr = document.getElementById('afasTokenVcrInput')?.value || afasToken;
  afasToken = afasTokenVcr;
  afasTokenRegels = afasTokenVcr;
  const c = document.getElementById('mainContent');
  c.innerHTML = '<div class="loader"><div class="spinner"></div> Voorcalculatieregels laden...</div>';
  try {
    // Alleen definitieve voorcalculaties ophalen (VC_StatusCode = 1)
    const data = await afasGet('PowerP_Voorcalculatie');
    vcrData = data;
    renderVcrTable(c);
    showToast(`${vcrData.length} voorcalculatieregels geladen`, 'success');
  } catch(e) { c.innerHTML = `<div class="empty-state">Fout: ${e.message}</div>`; }
}

function isVcrAbonnement(r) {
  return r.Artikel_Soort && r.Artikel_Soort.toLowerCase().includes('abonnement');
}

function isVcrTekst(r) {
  return r.Type_item && r.Type_item.toLowerCase() === 'tekst';
}

function isVcrGoedgekeurd(r) {
  // Goedgekeurd = VC_StatusCode niet 0 (Onderhanden) of 3 (Verloren)
  return r.VC_StatusCode !== '0' && r.VC_StatusCode !== '3';
}

function isVcrOpen(r) {
  if (isVcrAbonnement(r)) return !r.Verwerkt_in_Abo;
  return !r.Overgenomen_naar_nacalculatie;
}

function vcrStatus(r) {
  // Bepaal de verwerkingsstatus van een regel
  const goedgekeurd = isVcrGoedgekeurd(r);
  const verwerkt = isVcrAbonnement(r) ? r.Verwerkt_in_Abo : r.Overgenomen_naar_nacalculatie;
  if (verwerkt) return 'verwerkt';
  if (!goedgekeurd) return 'onderhanden'; // VC niet goedgekeurd
  if (!r.VC_Project) return 'geen_project'; // Goedgekeurd maar geen project
  return 'klaar'; // Goedgekeurd + project aanwezig = klaar om te verwerken
}

function vcrOrganisatie(r) {
  // Project organisatie heeft prioriteit, val terug op forecast organisatie
  if (r.Project_Organisatie) return r.Project_Organisatie;
  if (r.Forecast_Organisatie) return r.Forecast_Organisatie;
  return null;
}

              <th onclick="sortVcr('VC_Verkooprelatie')" class="${vcrSortField==='VC_Verkooprelatie'?'sorted':''}">Klant <span class="sort-icon">↕</span></th>

              <th onclick="sortVcr('VCR_Eenheidsprijs')" class="${vcrSortField==='VCR_Eenheidsprijs'?'sorted':''}">Prijs <span class="sort-icon">↕</span></th>
              <th>Project / Status</th>
              <th>Status</th>

              <th>Omschrijving</th>
              <th onclick="sortVcr('VCR_Itemcode')" class="${vcrSortField==='VCR_Itemcode'?'sorted':''}">Itemcode <span class="sort-icon">↕</span></th>
              <th onclick="sortVcr('Artikel_Soort')" class="${vcrSortField==='Artikel_Soort'?'sorted':''}">Soort <span class="sort-icon">↕</span></th>

              <th onclick="sortVcr('VCR_Eenheidsprijs')" class="${vcrSortField==='VCR_Eenheidsprijs'?'sorted':''}">Prijs <span class="sort-icon">↕</span></th>
              <th>Project / Status</th>
              <th>Status</th>
              <th></th>`}
            </tr>
          </thead>
          <tbody id="vcrTbody">
            ${renderVcrRows()}
          </tbody>
        </table>
      </div>
    </div>`;

  updateVcrCount();
}

let vcrGefilterd = [];

function applyVcrFilters() {
  const definitief = vcrData.filter(r => r.VC_StatusCode === '1');
  const bron = vcrView === 'abonnement'
    ? definitief.filter(r => !isVcrTekst(r) && isVcrAbonnement(r))
    : definitief.filter(r => !isVcrTekst(r) && !isVcrAbonnement(r));

  vcrGefilterd = bron.filter(r => {
    if (vcrFilters.klant && !r.VC_Verkooprelatie?.toLowerCase().includes(vcrFilters.klant.toLowerCase()) &&
        !r.Forecast_Organisatie?.toLowerCase().includes(vcrFilters.klant.toLowerCase()) &&
        !r.Project_Organisatie?.toLowerCase().includes(vcrFilters.klant.toLowerCase())) return false;
    if (vcrFilters.itemcode && !r.VCR_Itemcode?.toLowerCase().includes(vcrFilters.itemcode.toLowerCase())) return false;
    if (vcrFilters.vc && !r.VC_Nummer?.toLowerCase().includes(vcrFilters.vc.toLowerCase())) return false;
    const status = vcrStatus(r);
    if (vcrFilters.status === 'klaar' && status !== 'klaar') return false;
    if (vcrFilters.status === 'geen_project' && status !== 'geen_project') return false;
    if (vcrFilters.status === 'open' && status === 'verwerkt') return false;
    if (vcrFilters.status === 'verwerkt' && status !== 'verwerkt') return false;
    if (vcrFilters.status === 'onderhanden' && status !== 'onderhanden') return false;
    if (vcrFilters.projectStatus === 'geen' && r.VC_Project) return false;
    if (vcrFilters.projectStatus && vcrFilters.projectStatus !== 'geen' && r.Project_Status !== vcrFilters.projectStatus) return false;
    return true;
  });

  vcrGefilterd.sort((a, b) => {
    const av = a[vcrSortField] ?? '';
    const bv = b[vcrSortField] ?? '';
    if (typeof av === 'number') return (av - bv) * vcrSortDir;
    return String(av).localeCompare(String(bv)) * vcrSortDir;
  });
}

function sortVcr(field) {
  if (vcrSortField === field) vcrSortDir *= -1;
  else { vcrSortField = field; vcrSortDir = 1; }
  applyVcrFilters();
  updateVcrTbody();
}

function updateVcrCount() {
  const el = document.getElementById('vcrCount');
  if (el) el.textContent = `${vcrGefilterd.length} regels`;

function updateVcrTbody() {
  updateVcrCount();
  document.getElementById('vcrTbody').innerHTML = renderVcrRows();

async function maakNieuwAbonnement(guid) {
  const r = vcrData.find(x => x.VCR_GUID === guid);
  if (!r) return;
  const startdatum = document.getElementById('aboStartdatum').value;
  const factuurdatum = document.getElementById('aboFactuurdatum').value;
  const korting50 = document.getElementById('aboKorting50').value === 'ja';
  const afwPrijs = document.getElementById('aboAfwPrijs').value;

  const regelomschrijving = document.getElementById('aboRegelomschrijving').value;

  const lineFields = {
    "VaIt": "2",
    "ItCd": r.VCR_Itemcode,
    "Qu": parseFloat(r.VCR_Aantal),
    "InFr": factuurdatum,
    "DaSt": factuurdatum
  };
  if (afwPrijs) lineFields["Pric"] = parseFloat(afwPrijs);
  if (korting50) { lineFields["DcPr"] = 50; lineFields["IsPc"] = true; }
  if (regelomschrijving) lineFields["U62872DFA07C24735AABDF3FC24D5DBC3"] = regelomschrijving;

  const body = {
    "FbSubscription": {
      "Element": {
        "Fields": {
          "BcId": r.VC_Verkooprelatienr,
          "DbId": r.VC_Verkooprelatienr,
          "SuSt": startdatum,
          "DaSt": factuurdatum,
          "VaSu": "100",
          "VaIn": r.VCR_Frequentie
        },
        "Objects": {
          "FbSubscriptionLines": {
            "Element": { "Fields": lineFields }
          }
        }
      }
    }
  };

  try {
    const res = await fetch(`${AFAS_BASE}/connectors/FbSubscription`, {
      method: 'POST',
      headers: { 'Authorization': `AfasToken ${btoa(afasToken)}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (res.ok || res.status === 201) {
      // Vink verwerkt in abo aan op de voorcalculatieregel
      await vinkVerwerktInAbo(guid);
      document.getElementById('vcrModal')?.remove();
      r.Verwerkt_in_Abo = true;
      applyVcrFilters();
      updateVcrTbody();
      showToast(`Abonnement aangemaakt voor ${r.VC_Verkooprelatie}`, 'success');
    } else {
      const err = await res.text();
      showToast(`Fout: ${err.substring(0,150)}`, 'error');
    }
  } catch(e) { showToast('Fout: ' + e.message, 'error'); }
}

async function maakNacalculatie(guid) {
  const r = vcrData.find(x => x.VCR_GUID === guid);
  if (!r) return;

  const datum = document.getElementById('nacalcDatum').value;
  const splits = parseInt(document.getElementById('nacalcSplits').value);
  const korting50 = document.getElementById('nacalcKorting50').value === 'ja';
  const afwPrijs = document.getElementById('nacalcAfwPrijs').value;

  if (!datum) { showToast('Vul een datum in', 'error'); return; }
  if (!r.VC_Project) { showToast('Geen project gekoppeld aan deze voorcalculatie', 'error'); return; }

  const aantalPerRegel = splits > 1 ? 1 : parseFloat(r.VCR_Aantal);
  const aantalRegels = splits > 1 ? parseInt(r.VCR_Aantal) : 1;

  let ok = 0; let errors = 0;
  for (let i = 0; i < aantalRegels; i++) {
    const fields = {
      "DaTi": datum,
      "VaIt": "2",
      "ItCd": r.VCR_Itemcode,
      "Qu": aantalPerRegel,
      "PrId": r.VC_Project,
      "DbId": r.VC_Verkooprelatienr,
      "BcId": r.VC_Verkooprelatienr,
      "Ds": r.VCR_Omschrijving || r.VCR_Itemcode,
      "Ch": r.VCR_Doorbelasten !== false
    };
    if (afwPrijs) fields["AmSe"] = parseFloat(afwPrijs);
    else if (r.VCR_Eenheidsprijs) fields["AmSe"] = parseFloat(r.VCR_Eenheidsprijs);
    if (korting50) fields["DcPr"] = 50;

    const body = { "PtRealization": { "Element": { "Fields": fields } } };

    try {
      const res = await fetch(`${AFAS_BASE}/connectors/PtRealization`, {
        method: 'POST',
        headers: { 'Authorization': `AfasToken ${btoa(afasToken)}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (res.ok || res.status === 201) { ok++; }
      else {
        errors++;
        const err = await res.text();
        showToast(`Fout regel ${i+1}: ${err.substring(0,150)}`, 'error');
      }
    } catch(e) { errors++; showToast('Fout: ' + e.message, 'error'); }
  }

  if (ok > 0) {
    // Vink overgenomen naar nacalculatie aan op de voorcalculatieregel
    await vinkVerwerktNacalc(guid);
    document.getElementById('vcrModal')?.remove();
    r.Overgenomen_naar_nacalculatie = true;
    applyVcrFilters();
    updateVcrTbody();
    showToast(`${ok} nacalculatieregel(s) aangemaakt voor ${r.VC_Verkooprelatie}`, 'success');
  }
}

}

window.addEventListener('load', initMsal);
</script>
